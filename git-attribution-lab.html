<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attribution viz · dev lab</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ============================================================
       "Which mind built which page" — model-attribution viz.
       family.co form language (soft rounded cards, conic app-icon
       tiles, a single-focus bottom tray, morphing/counting numbers)
       in the site's olive-black + eruption-orange palette. Scoped
       under .ma- so nothing leaks into the page.
       ============================================================ */
    #ma-root {
      --ma-card: #333b34;
      --ma-card-hi: #3a4239;
      --ma-tray: #2b322c;
      --ma-hair: rgba(245, 241, 234, 0.07);
      --ma-hair-2: rgba(245, 241, 234, 0.12);
      --ma-r: 20px;
      --ma-r-in: 13px;
      --ma-shadow: 0 1px 2px rgba(0,0,0,0.22), 0 10px 24px -10px rgba(0,0,0,0.55);
      --ma-shadow-lift: 0 2px 6px rgba(0,0,0,0.28), 0 22px 44px -14px rgba(0,0,0,0.62);
      --ma-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      margin: 1.5rem 0 0;
    }

    /* ---------- the five minds (legend + fuel key) ---------- */
    .ma-minds { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.6rem; }
    .ma-mind {
      display: inline-flex; align-items: baseline; gap: 0.5rem;
      padding: 0.5rem 0.85rem; background: var(--ma-card);
      border: 1px solid var(--ma-hair); border-radius: 999px;
      box-shadow: var(--ma-shadow);
    }
    .ma-mind.is-minor { opacity: 0.5; }
    .ma-mind-dot { width: 9px; height: 9px; border-radius: 50%; align-self: center; box-shadow: 0 0 8px currentColor; }
    .ma-mind-name { font-family: var(--font-heading); font-size: 1.02rem; color: var(--text-bright); font-weight: 700; letter-spacing: -0.01em; }
    .ma-mind-fuel { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.01em; }
    .ma-mind-posts { font-family: var(--font-body); font-size: 0.72rem; color: #8d9387; }

    /* ---------- controls: the Changes <-> Tokens toggle ---------- */
    .ma-controls { display: flex; align-items: center; flex-wrap: wrap; gap: 0.6rem 1rem; margin-bottom: 1.4rem; }
    .ma-toggle {
      position: relative; display: inline-flex; padding: 3px;
      background: #232a24; border: 1px solid var(--ma-hair); border-radius: 999px;
    }
    .ma-seg {
      position: relative; z-index: 2; border: 0; background: none; cursor: pointer;
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 600;
      color: var(--text-dim); padding: 0.4rem 0.95rem; border-radius: 999px;
      transition: color 0.25s ease;
    }
    .ma-seg.is-on { color: #1a1f1a; }
    .ma-seg:focus-visible { outline: none; box-shadow: 0 0 0 2px rgba(232,149,78,0.55); }
    .ma-seg-glider {
      position: absolute; z-index: 1; top: 3px; left: 3px; bottom: 3px;
      width: calc(50% - 3px); border-radius: 999px;
      background: linear-gradient(180deg, #F4B36B, #E8954E);
      box-shadow: 0 2px 8px -1px rgba(232,149,78,0.5);
      transition: transform 0.4s var(--ma-spring);
    }
    .ma-toggle.is-tokens .ma-seg-glider { transform: translateX(100%); }
    .ma-controls-note { margin: 0; font-family: var(--font-body); font-size: 0.84rem; color: var(--text-dim); font-style: italic; }

    /* ---------- the tile grid ---------- */
    .ma-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(126px, 1fr)); gap: 0.85rem; }
    .ma-tile {
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
      padding: 1.1rem 0.7rem 0.95rem; cursor: pointer;
      background: var(--ma-card); border: 1px solid var(--ma-hair);
      border-radius: var(--ma-r); box-shadow: var(--ma-shadow);
      transition: transform 0.34s var(--ma-spring), box-shadow 0.34s ease, background 0.2s ease, border-color 0.2s ease;
      animation: ma-rise 0.5s var(--ma-spring) both; animation-delay: calc(var(--i) * 28ms);
    }
    @keyframes ma-rise { from { opacity: 0; transform: translateY(12px) scale(0.96); } to { opacity: 1; transform: none; } }
    @media (hover: hover) {
      .ma-tile:hover { transform: translateY(-4px); box-shadow: var(--ma-shadow-lift); background: var(--ma-card-hi); border-color: var(--ma-hair-2); }
      .ma-tile:hover .ma-donut { transform: scale(1.04) rotate(-2deg); }
    }
    .ma-tile:focus-visible { outline: none; box-shadow: var(--ma-shadow-lift), 0 0 0 2px rgba(232,149,78,0.6); }
    .ma-tile:active { transform: translateY(-1px) scale(0.985); }

    /* the conic ring "app icon" */
    .ma-donut {
      position: relative; width: 66px; height: 66px; border-radius: 50%;
      background: #3a443b; transition: transform 0.34s var(--ma-spring);
    }
    .ma-donut-hole {
      position: absolute; inset: 9px; border-radius: 50%;
      background: var(--ma-card); display: grid; place-items: center;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }
    .ma-tile:hover .ma-donut-hole { background: var(--ma-card-hi); }
    .ma-donut-val { font-family: var(--font-heading); font-size: 1.05rem; font-weight: 700; color: var(--text-bright); letter-spacing: -0.02em; line-height: 1; }
    .ma-tile-title { font-family: var(--font-heading); font-size: 0.92rem; font-weight: 700; color: var(--text-bright); text-align: center; line-height: 1.15; letter-spacing: -0.01em; max-width: 100%; }
    .ma-tile.is-arch .ma-tile-title { font-style: italic; color: var(--text); }
    .ma-tile-sub { font-family: var(--font-mono); font-size: 0.62rem; color: #8d9387; letter-spacing: 0.01em; text-align: center; }

    /* ---------- the single-focus tray ---------- */
    .ma-scrim {
      position: fixed; inset: 0; z-index: 50; background: rgba(8, 10, 8, 0.55);
      -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
      opacity: 0; pointer-events: none; transition: opacity 0.32s ease;
    }
    .ma-scrim.is-on { opacity: 1; pointer-events: auto; }
    .ma-tray {
      position: fixed; z-index: 51; left: 50%; bottom: clamp(14px, 4vh, 46px);
      width: min(540px, 92vw); transform: translateX(-50%) translateY(130%);
      background: var(--ma-tray); border: 1px solid var(--ma-hair-2);
      border-radius: 26px; padding: 1.4rem 1.5rem 1.5rem;
      box-shadow: 0 30px 80px -20px rgba(0,0,0,0.75), 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none;
      transition: transform 0.52s var(--ma-spring), opacity 0.3s ease;
      max-height: 86vh; overflow-y: auto;
    }
    .ma-tray.is-on { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
    .ma-tray-x {
      position: absolute; top: 1rem; right: 1rem; width: 32px; height: 32px;
      display: grid; place-items: center; color: var(--text-dim);
      background: rgba(255,255,255,0.04); border: 1px solid var(--ma-hair); border-radius: 50%;
      cursor: pointer; transition: color 0.2s, background 0.2s;
    }
    .ma-tray-x:hover { color: var(--text-bright); background: rgba(255,255,255,0.09); }
    .ma-tray-head { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.3rem; }
    .ma-donut-lg { width: 78px; height: 78px; flex: 0 0 auto; }
    .ma-donut-lg .ma-donut-hole { inset: 11px; background: var(--ma-tray); }
    .ma-donut-lg .ma-donut-val { font-size: 1.2rem; }
    .ma-tray-id { min-width: 0; }
    .ma-tray-kind { font-family: var(--font-body); font-size: 0.64rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #8d9387; }
    .ma-tray-kind.is-arch { color: #b39b6a; }
    .ma-tray-title { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 700; color: var(--text-bright); margin: 0.15rem 0 0.2rem; line-height: 1.1; letter-spacing: -0.015em; }
    .ma-tray-when { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-dim); }

    .ma-tray-bar { display: flex; gap: 2px; height: 14px; border-radius: 999px; overflow: hidden; background: #1c211d; margin-bottom: 1.1rem; }
    .ma-barseg { width: 0; transition: width 0.7s var(--ma-spring); }
    .ma-barseg:first-child { border-radius: 999px 0 0 999px; }
    .ma-barseg:last-child { border-radius: 0 999px 999px 0; }

    .ma-tray-rows { display: flex; flex-direction: column; gap: 0.1rem; }
    .ma-row {
      display: grid; grid-template-columns: auto 1fr auto auto; align-items: baseline; gap: 0.7rem;
      padding: 0.55rem 0; border-bottom: 1px solid var(--ma-hair);
      animation: ma-row-in 0.5s var(--ma-spring) both; animation-delay: calc(var(--i) * 70ms + 120ms);
    }
    .ma-row:last-child { border-bottom: 0; }
    @keyframes ma-row-in { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
    .ma-row-dot { width: 11px; height: 11px; border-radius: 50%; align-self: center; box-shadow: 0 0 8px currentColor; }
    .ma-row-name { font-family: var(--font-heading); font-size: 1.05rem; font-weight: 700; color: var(--text-bright); }
    .ma-row-val { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-dim); }
    .ma-row-pct { font-family: var(--font-heading); font-size: 1.25rem; font-weight: 700; color: var(--text-bright); min-width: 2.6em; text-align: right; letter-spacing: -0.02em; }
    .ma-tray-link {
      display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 1.2rem;
      font-family: var(--font-body); font-size: 0.9rem; color: var(--accent);
      text-decoration: none; border-bottom: 1px solid transparent; transition: color 0.2s, border-color 0.2s;
    }
    .ma-tray-link:hover { color: var(--accent-hover); border-bottom-color: var(--accent-hover); }

    @media (max-width: 560px) {
      .ma-grid { grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap: 0.6rem; }
      .ma-donut { width: 58px; height: 58px; }
      .ma-tile-title { font-size: 0.84rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      .ma-tile, .ma-row { animation: none; }
      .ma-donut, .ma-tile, .ma-barseg, .ma-tray, .ma-seg-glider { transition: opacity 0.2s ease; }
    }

    /* lab chrome only */
    .labwrap { max-width: 920px; margin: 0 auto; padding: 2rem 1.25rem 6rem; }
    .labwrap h1 { font-family: var(--font-heading); color: var(--text-bright); }
    .labwrap .spacer { height: 120vh; }
  </style>
</head>
<body>
  <div class="labwrap">
    <h1>Which mind built which page</h1>
    <p style="color:var(--text-dim);font-style:italic;max-width:60ch">Dev lab. Tap a tile to open its tray; flip Changes/Tokens to morph the split.</p>
    <div id="ma-root"></div>
    <div class="spacer"></div>
  </div>
  <script src="js/git-attribution-data.js"></script>
  <script src="js/git-attribution.js"></script>
</body>
</html>
