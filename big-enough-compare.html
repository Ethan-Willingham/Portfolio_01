<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Big Enough: original vs new voice</title>
  <style>
    :root {
      --bg: #303931; --bar: #1e2420; --rule: #4a544b;
      --text: #e8e2d6; --bright: #f5f1ea; --dim: #b8b2a2; --accent: #d4c4a0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      display: flex; flex-direction: column; height: 100vh;
      background: var(--bg); color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    .bar {
      flex: 0 0 auto; display: flex; align-items: center; gap: 1rem 1.4rem;
      flex-wrap: wrap; padding: 0.6rem 1.1rem;
      background: rgba(30,36,32,0.97); border-bottom: 1px solid var(--rule);
    }
    .bar h1 { font-size: 0.98rem; font-weight: 600; margin: 0; color: var(--bright); }
    .bar .note { font-size: 0.82rem; line-height: 1.4; color: var(--dim); max-width: 60ch; }
    .bar label {
      font-family: ui-monospace, "Commit Mono", monospace; font-size: 0.74rem;
      letter-spacing: 0.06em; color: var(--dim); margin-left: auto;
      display: flex; align-items: center; gap: 0.45rem; cursor: pointer; user-select: none;
    }
    .bar input { accent-color: var(--accent); cursor: pointer; }

    .panes { flex: 1 1 auto; display: flex; min-height: 0; }
    .pane { flex: 1 1 50%; display: flex; flex-direction: column; min-width: 0; }
    .pane + .pane { border-left: 1px solid var(--rule); }
    .label {
      flex: 0 0 auto; padding: 0.4rem 0.9rem;
      font-family: ui-monospace, "Commit Mono", monospace; font-size: 0.7rem;
      letter-spacing: 0.13em; text-transform: uppercase;
      background: var(--bar); border-bottom: 1px solid var(--rule);
    }
    .label .a { color: var(--accent); }
    .label .b { color: var(--dim); }
    .pane iframe { flex: 1 1 auto; width: 100%; border: 0; background: var(--bg); }

    @media (max-width: 820px) {
      body { height: auto; }
      .panes { flex-direction: column; }
      .pane { height: 92vh; }
      .pane + .pane { border-left: 0; border-top: 6px solid var(--bar); }
      .bar label { margin-left: 0; }
    }
  </style>
</head>
<body>
  <header class="bar">
    <h1>Big Enough</h1>
    <p class="note">Left is your live post, untouched. Right is the same post rewritten in the new voice. Same facts, numbers, and sources, new sentences.</p>
    <label><input type="checkbox" id="sync" checked> sync scroll</label>
  </header>

  <div class="panes">
    <section class="pane">
      <div class="label"><span class="b">Original</span> <span class="a">(live, untouched)</span></div>
      <iframe id="left" title="Original Big Enough post" src="big-enough.html"></iframe>
    </section>
    <section class="pane">
      <div class="label"><span class="b">Rewritten</span> <span class="a">(new voice)</span></div>
      <iframe id="right" title="Rewritten Big Enough post" src="big-enough-rewrite.html"></iframe>
    </section>
  </div>

  <script>
    // Proportional scroll sync between the two same-origin iframes.
    var L = document.getElementById('left');
    var R = document.getElementById('right');
    var sync = document.getElementById('sync');
    var lock = false;

    function mirror(from, to) {
      if (!sync.checked || lock) return;
      lock = true;
      try {
        var fw = from.contentWindow, tw = to.contentWindow;
        var fDoc = fw.document.documentElement;
        var tDoc = tw.document.documentElement;
        var fMax = fDoc.scrollHeight - fw.innerHeight;
        var tMax = tDoc.scrollHeight - tw.innerHeight;
        var frac = fMax > 0 ? (fw.scrollY || fw.pageYOffset) / fMax : 0;
        tw.scrollTo(0, frac * tMax);
      } catch (e) { /* cross-origin or not ready: ignore */ }
      requestAnimationFrame(function () { lock = false; });
    }

    function attach(which) {
      try {
        which.contentWindow.addEventListener(
          'scroll',
          function () { mirror(which, which === L ? R : L); },
          { passive: true }
        );
      } catch (e) { /* ignore */ }
    }

    L.addEventListener('load', function () { attach(L); });
    R.addEventListener('load', function () { attach(R); });
  </script>
</body>
</html>
