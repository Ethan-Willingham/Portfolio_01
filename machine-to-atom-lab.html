<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine to Atom, zoom-quilt lab</title>
<style>
  :root { --bg:#0c0f08; --panel:#161b12; --ink:#E8E2D6; --dim:#9aa08c; --gold:#d4c4a0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--ink); font-family:'Commit Mono',ui-monospace,Consolas,monospace; overflow:hidden; }
  #stage { position:fixed; inset:0; }
  #c { width:100%; height:100%; display:block; cursor:crosshair; }
  /* HUD top-left */
  #hud { position:fixed; top:10px; left:12px; z-index:5; font-size:12px; line-height:1.5; color:var(--gold); text-shadow:0 1px 3px #000; pointer-events:none; }
  #hud b { color:#fff; }
  /* control panel bottom */
  #panel { position:fixed; left:0; right:0; bottom:0; z-index:6; background:rgba(12,15,8,0.92); border-top:1px solid #2c3327; padding:10px 14px 12px; backdrop-filter:blur(6px); }
  #scrubRow { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  #scrub { flex:1; }
  .ctrls { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:6px 18px; font-size:11px; }
  .ctrl { display:flex; align-items:center; gap:8px; }
  .ctrl label { color:var(--dim); width:96px; flex:none; }
  .ctrl input[type=range] { flex:1; }
  .ctrl .val { color:var(--gold); width:48px; text-align:right; }
  button { font-family:inherit; font-size:12px; background:#222a1c; color:var(--ink); border:1px solid #3a4430; border-radius:5px; padding:5px 12px; cursor:pointer; }
  button:hover { border-color:var(--gold); color:#fff; }
  #note { font-size:11px; color:var(--dim); margin-top:8px; }
  #note kbd { background:#222a1c; border:1px solid #3a4430; border-radius:3px; padding:1px 5px; color:var(--gold); }
  a.back { position:fixed; top:10px; right:14px; z-index:7; color:var(--dim); font-size:11px; text-decoration:none; }
  a.back:hover { color:var(--gold); }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>
<div id="hud"></div>
<a class="back" href="/">close lab</a>

<div id="panel">
  <div id="scrubRow">
    <button id="play">play</button>
    <input id="scrub" type="range" min="0" max="3" step="0.0005" value="0">
    <span id="scrubVal" style="color:var(--gold);width:78px;text-align:right;font-size:12px;">0.000</span>
  </div>
  <div class="ctrls">
    <div class="ctrl"><label>play speed</label><input id="speed" type="range" min="0.05" max="1.2" step="0.01" value="0.32"><span class="val" id="speedV"></span></div>
    <div class="ctrl"><label>dissolve</label><input id="ov" type="range" min="0.05" max="0.6" step="0.01" value="0.3"><span class="val" id="ovV"></span></div>
    <div class="ctrl"><label>zoom/img (x)</label><input id="zoomx" type="range" min="3" max="14" step="0.5" value="7"><span class="val" id="zoomxV"></span></div>
    <div class="ctrl"><label>ease</label><input id="ease" type="range" min="1" max="3" step="0.1" value="1.6"><span class="val" id="easeV"></span></div>
    <div class="ctrl"><label>warmth</label><input id="warm" type="range" min="0" max="0.5" step="0.01" value="0.16"><span class="val" id="warmV"></span></div>
    <div class="ctrl"><label>contrast</label><input id="con" type="range" min="0.9" max="1.3" step="0.01" value="1.06"><span class="val" id="conV"></span></div>
    <div class="ctrl"><label>vignette</label><input id="vig" type="range" min="0" max="0.8" step="0.02" value="0.42"><span class="val" id="vigV"></span></div>
    <div class="ctrl"><label>black lift</label><input id="lift" type="range" min="0" max="0.5" step="0.02" value="0.12"><span class="val" id="liftV"></span></div>
  </div>
  <div id="note">Click the image to set the <b style="color:var(--gold)">focal point</b> of the layer currently filling the screen (the spot you fall into). <kbd>F</kbd> toggles focal markers. <kbd>Space</kbd> play/pause. <button id="dump" style="padding:2px 8px;">copy params</button> to hand the tuned values back.</div>
</div>

<script>
(function(){
  'use strict';
  // ---- the photo span: 3 high-res sources, deep-zoomed and match-cut ----
  // fx,fy = normalized focal point (where the NEXT scale lives) you fall toward.
  // Set them by clicking the image in the lab.
  var IMAGES = [
    { key:'machine', src:'assets/images/zoom/machine.jpg', fx:0.50, fy:0.52, label:'EUV machine  (~6 m to 0.6 m)' },
    { key:'wafer',   src:'assets/images/zoom/wafer.jpg',   fx:0.50, fy:0.50, label:'300 mm wafer (~0.3 m to 60 mm)' },
    { key:'die',     src:'assets/images/zoom/die.jpg',     fx:0.50, fy:0.50, label:'chip die    (~12 mm to 2.5 mm)' }
  ];
  var N = IMAGES.length;

  var c = document.getElementById('c'), ctx = c.getContext('2d');
  var hud = document.getElementById('hud');
  var dpr = Math.min(window.devicePixelRatio||1, 2);
  var VW=0, VH=0;
  function resize(){ VW=c.clientWidth; VH=c.clientHeight; c.width=Math.round(VW*dpr); c.height=Math.round(VH*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', function(){ resize(); render(); });

  var imgs = [], loaded = 0;
  IMAGES.forEach(function(cfg,i){
    var im = new Image();
    im.onload = function(){ loaded++; cfg.W=im.naturalWidth; cfg.H=im.naturalHeight; if(loaded===N){ resize(); render(); } };
    im.onerror = function(){ console.error('failed', cfg.src); };
    im.src = cfg.src; imgs[i]=im;
  });

  // ---- controls ----
  var $ = function(id){ return document.getElementById(id); };
  var scrub=$('scrub'), playBtn=$('play');
  var P = { speed:0.32, ov:0.3, zoomx:7, ease:1.6, warm:0.16, con:1.06, vig:0.42, lift:0.12 };
  function bind(id,key,fmt){ var el=$(id), v=$(id+'V'); el.value=P[key]; v.textContent=(fmt||function(x){return (+x).toFixed(2);})(P[key]); el.addEventListener('input',function(){ P[key]=+el.value; v.textContent=(fmt||function(x){return (+x).toFixed(2);})(P[key]); render(); }); }
  bind('speed','speed'); bind('ov','ov'); bind('zoomx','zoomx',function(x){return (+x).toFixed(1)+'x';});
  bind('ease','ease',function(x){return (+x).toFixed(1);}); bind('warm','warm'); bind('con','con'); bind('vig','vig'); bind('lift','lift');

  var showFocal = true;
  var progress = 0; // 0 .. N
  scrub.max = N; scrub.addEventListener('input', function(){ progress=+scrub.value; $('scrubVal').textContent=progress.toFixed(3); pause(); render(); });

  // ---- easing ----
  function clamp(v,a,b){ return v<a?a:v>b?b:v; }
  function lerp(a,b,t){ return a+(b-a)*t; }
  function easeInPow(t,k){ return Math.pow(clamp(t,0,1), k); }

  // draw one image at zoom t (0=widest cover, 1=focal-exit crop), centered panning toward focal
  function drawLayer(cfg, im, t, alpha){
    var W=cfg.W, H=cfg.H;
    // cover-crop width for the viewport aspect
    var coverW = Math.min(W, H * (VW/VH));
    var exitW = coverW / P.zoomx;            // how far we zoom into this image before the hand-off
    // geometric (constant-log-velocity) crop width; clamp so it never exceeds the source
    var cw = coverW * Math.pow(exitW/coverW, clamp(t,0,1.05));
    cw = Math.min(cw, coverW);
    var ch = cw * (VH/VW);
    // pan from image center toward the focal point as we zoom in
    var te = easeInPow(clamp(t,0,1), P.ease);
    var cx = lerp(W/2, cfg.fx*W, te);
    var cy = lerp(H/2, cfg.fy*H, te);
    var sx = clamp(cx - cw/2, 0, Math.max(0,W-cw));
    var sy = clamp(cy - ch/2, 0, Math.max(0,H-ch));
    ctx.globalAlpha = alpha;
    ctx.filter = 'contrast('+P.con+') saturate('+(1-P.warm*0.5)+') sepia('+P.warm+')';
    ctx.drawImage(im, sx, sy, cw, ch, 0, 0, VW, VH);
    ctx.filter = 'none';
    ctx.globalAlpha = 1;
    return { sx:sx, sy:sy, cw:cw, ch:ch, te:te };
  }

  function render(){
    if(loaded<N) return;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.globalAlpha=1; ctx.clearRect(0,0,VW,VH);
    ctx.fillStyle = '#07090c'; ctx.fillRect(0,0,VW,VH);

    var i = clamp(Math.floor(progress), 0, N-1);
    var t = progress - i;
    var info = drawLayer(IMAGES[i], imgs[i], t, 1);

    // cross-dissolve into the next image over the last `ov` of this layer
    var nextAlpha = 0, ni = i+1;
    if(t > 1-P.ov && ni < N){
      nextAlpha = (t-(1-P.ov))/P.ov;
      var tn = progress - ni;             // negative during overlap -> clamps to cover (widest)
      drawLayer(IMAGES[ni], imgs[ni], tn, nextAlpha);
    }

    grade();
    if(showFocal) drawFocalMarker(IMAGES[i], info, nextAlpha<0.5);
    drawHud(i, t, info);
  }

  // grade pass: lift blacks to deep green-black + gold tint + vignette
  function grade(){
    if(P.lift>0){
      ctx.globalCompositeOperation='lighten';
      ctx.fillStyle='rgba(20,24,15,'+P.lift+')';
      ctx.fillRect(0,0,VW,VH);
      ctx.globalCompositeOperation='source-over';
    }
    if(P.warm>0){
      ctx.globalCompositeOperation='soft-light';
      ctx.fillStyle='rgba(212,170,90,'+(P.warm*0.8)+')';
      ctx.fillRect(0,0,VW,VH);
      ctx.globalCompositeOperation='source-over';
    }
    if(P.vig>0){
      var g=ctx.createRadialGradient(VW/2,VH*0.46,Math.min(VW,VH)*0.2, VW/2,VH*0.5,Math.max(VW,VH)*0.75);
      g.addColorStop(0,'rgba(7,9,6,0)'); g.addColorStop(1,'rgba(7,9,6,'+P.vig+')');
      ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
    }
  }

  function drawFocalMarker(cfg, info, primary){
    // where the focal point currently sits on screen
    var fxImg=cfg.fx*cfg.W, fyImg=cfg.fy*cfg.H;
    var sxScreen = (fxImg-info.sx)/info.cw*VW;
    var syScreen = (fyImg-info.sy)/info.ch*VH;
    ctx.save();
    ctx.strokeStyle = primary?'rgba(255,226,150,0.9)':'rgba(255,226,150,0.4)';
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(sxScreen,syScreen,12,0,6.2832); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sxScreen-18,syScreen); ctx.lineTo(sxScreen+18,syScreen); ctx.moveTo(sxScreen,syScreen-18); ctx.lineTo(sxScreen,syScreen+18); ctx.stroke();
    ctx.restore();
  }

  function drawHud(i,t,info){
    var mag = (Math.min(IMAGES[i].W, IMAGES[i].H*(VW/VH))/info.cw);
    hud.innerHTML = 'layer <b>'+(i+1)+'/'+N+'</b> &middot; '+IMAGES[i].label+'<br>'+
      't '+t.toFixed(3)+' &middot; mag <b>'+mag.toFixed(1)+'x</b> into this image<br>'+
      'focal ('+IMAGES[i].fx.toFixed(3)+', '+IMAGES[i].fy.toFixed(3)+')';
  }

  // ---- click to set focal point of the dominant layer ----
  c.addEventListener('click', function(e){
    if(loaded<N) return;
    var i = clamp(Math.floor(progress),0,N-1);
    // if we're deep in the dissolve, the NEXT layer is the one filling the screen
    var t = progress - i;
    if(t > 1-P.ov*0.5 && i+1<N) i=i+1;
    var rect=c.getBoundingClientRect();
    var px=(e.clientX-rect.left)/rect.width, py=(e.clientY-rect.top)/rect.height;
    // map screen point back through the current crop to image-normalized coords
    var cfg=IMAGES[i], im=imgs[i];
    var tt = clamp(progress - i, 0, 1);
    var coverW=Math.min(cfg.W,cfg.H*(VW/VH)), exitW=coverW/P.zoomx;
    var cw=Math.min(coverW, coverW*Math.pow(exitW/coverW, clamp(tt,0,1.05))), ch=cw*(VH/VW);
    var te=easeInPow(tt,P.ease);
    var cx=lerp(cfg.W/2,cfg.fx*cfg.W,te), cy=lerp(cfg.H/2,cfg.fy*cfg.H,te);
    var sx=clamp(cx-cw/2,0,Math.max(0,cfg.W-cw)), sy=clamp(cy-ch/2,0,Math.max(0,cfg.H-ch));
    cfg.fx = clamp((sx + px*cw)/cfg.W, 0, 1);
    cfg.fy = clamp((sy + py*ch)/cfg.H, 0, 1);
    render();
  });

  // ---- play loop ----
  var playing=false, raf=0, last=0;
  function tick(ts){
    if(!playing) return;
    if(!last) last=ts;
    var dt=(ts-last)/1000; last=ts;
    progress += P.speed*dt;
    if(progress>=N){ progress=N; playing=false; playBtn.textContent='play'; }
    scrub.value=progress; $('scrubVal').textContent=progress.toFixed(3);
    render();
    if(playing) raf=requestAnimationFrame(tick);
  }
  function play(){ if(playing)return; if(progress>=N)progress=0; playing=true; last=0; playBtn.textContent='pause'; raf=requestAnimationFrame(tick); }
  function pause(){ playing=false; playBtn.textContent='play'; cancelAnimationFrame(raf); }
  playBtn.addEventListener('click', function(){ playing?pause():play(); });

  window.addEventListener('keydown', function(e){
    if(e.code==='Space'){ e.preventDefault(); playing?pause():play(); }
    if(e.key==='f'||e.key==='F'){ showFocal=!showFocal; render(); }
  });

  $('dump').addEventListener('click', function(){
    var out = IMAGES.map(function(c){ return '{ key:"'+c.key+'", fx:'+c.fx.toFixed(3)+', fy:'+c.fy.toFixed(3)+' }'; }).join(',\n');
    out += '\n// params: '+JSON.stringify(P);
    navigator.clipboard && navigator.clipboard.writeText(out);
    console.log(out); $('dump').textContent='copied';
    setTimeout(function(){ $('dump').textContent='copy params'; }, 1200);
  });

  // expose for headless inspection
  window.__lab = { get progress(){return progress;}, set progress(v){progress=v; scrub.value=v; render();}, IMAGES:IMAGES, P:P, render:render, loaded:function(){return loaded;} };
})();
</script>
</body>
</html>
