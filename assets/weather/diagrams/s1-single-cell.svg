<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 290" font-family="Georgia, 'Century Schoolbook', serif">
  <defs>
    <marker id="aWarm" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 z" fill="#c75b39"/></marker>
    <marker id="aCool" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 z" fill="#2c6e8f"/></marker>
    <marker id="aInk" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 z" fill="#4a4030"/></marker>
    <radialGradient id="sun" cx="40%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#fff3d4"/><stop offset="60%" stop-color="#f3c160"/><stop offset="100%" stop-color="#e2912a"/>
    </radialGradient>
  </defs>

  <!-- title -->
  <text x="220" y="26" text-anchor="middle" font-size="16" fill="#4a4030" font-style="italic">a planet that does not spin: one giant loop</text>

  <!-- ground -->
  <rect x="24" y="222" width="392" height="44" fill="#b9a06f" opacity="0.45"/>
  <line x1="24" y1="222" x2="416" y2="222" stroke="#6b5e44" stroke-width="2.2"/>

  <!-- sun over the equator -->
  <g transform="translate(78,64)">
    <g stroke="#f0b54c" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-26" x2="0" y2="-20"/><line x1="0" y1="20" x2="0" y2="26"/>
      <line x1="-26" y1="0" x2="-20" y2="0"/><line x1="20" y1="0" x2="26" y2="0"/>
      <line x1="-18" y1="-18" x2="-14" y2="-14"/><line x1="14" y1="14" x2="18" y2="18"/>
      <line x1="18" y1="-18" x2="14" y2="-14"/><line x1="-14" y1="14" x2="-18" y2="18"/>
    </g>
    <circle r="15" fill="url(#sun)" stroke="#ce8034"/>
  </g>

  <!-- the single convection loop, equator (left) to pole (right) -->
  <!-- rising leg at the hot equator -->
  <line x1="96" y1="214" x2="96" y2="104" fill="none" stroke="#c75b39" stroke-width="3.4" stroke-linecap="round" marker-end="url(#aWarm)"/>
  <!-- poleward flow aloft -->
  <path d="M104,92 Q220,62 336,92" fill="none" stroke="#4a4030" stroke-width="3.4" stroke-linecap="round" marker-end="url(#aInk)"/>
  <!-- sinking leg at the cold pole -->
  <line x1="344" y1="104" x2="344" y2="214" fill="none" stroke="#2c6e8f" stroke-width="3.4" stroke-linecap="round" marker-end="url(#aCool)"/>
  <!-- return flow along the surface -->
  <line x1="336" y1="214" x2="108" y2="214" fill="none" stroke="#4a4030" stroke-width="3.4" stroke-linecap="round" marker-end="url(#aInk)"/>

  <!-- annotations -->
  <text x="120" y="150" font-size="13.5" fill="#c75b39" font-style="italic">warm air rises</text>
  <text x="324" y="150" text-anchor="end" font-size="13.5" fill="#2c6e8f" font-style="italic">cool air sinks</text>
  <text x="220" y="208" text-anchor="middle" font-size="12.5" fill="#6b5e44" font-style="italic">and crawls back along the ground</text>

  <!-- place labels -->
  <text x="96" y="250" text-anchor="middle" font-size="14" fill="#6b5e44" font-variant="small-caps" letter-spacing="1">equator</text>
  <text x="344" y="250" text-anchor="middle" font-size="14" fill="#6b5e44" font-variant="small-caps" letter-spacing="1">pole</text>
</svg>
