<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Leaving portal lab</title>
  <link rel="preload" href="assets/fonts/century_supra_a_bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preconnect" href="https://en.wikipedia.org">
  <link rel="dns-prefetch" href="https://en.wikipedia.org">
  <link rel="stylesheet" href="style.css">
  <style>
  /* ============================================================
     LEAVING PORTAL LAB  (throwaway, noindex)
     The "Feeling lucky?" send-off. Built to Amelia Wattenberger's
     exact colour recipe (wattenberger.com):

       - big static serif "to a random wikipedia page", no letters moving
       - her literal text fill: linear-gradient(to bottom right IN OKLCH
         INCREASING HUE, oklch(6% 0.3 91) 0% 0%, <S>%, #8179FF 92% 100%)
       - the mid hint S sweeps 84% -> 6% so the OKLCH spectrum floods in

     Flow (owner's choice, the SAFE one): the effect plays IN PLACE on a
     full green screen (no scroll, so no white edge ever shows), then the
     whole tab navigates to the real random Wikipedia article. They end
     up literally on wikipedia.org (real URL) - not an embed under this
     site's URL - and Back returns here. location.replace() means the
     send-off is not a Back-stop (Back from Wikipedia -> the page they
     came from, i.e. the homepage in production).

     Font: site Century Supra (the three-font rule holds).
     ============================================================ */

  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg, #303931); }
  .send { position: fixed; inset: 0; display: grid; place-items: center; padding: 8vh 6vw; box-sizing: border-box; }
  .line {
    margin: 0; max-width: 16ch; text-align: center; text-wrap: balance;
    font-family: century_supra_a, 'Century Schoolbook', Georgia, serif;
    font-weight: 700; font-size: clamp(2.7rem, 12vw, 10rem); line-height: 0.95; letter-spacing: -0.02em;
    color: transparent; -webkit-text-fill-color: transparent;
    -webkit-background-clip: text; background-clip: text; background-repeat: no-repeat;
    background-image: linear-gradient(to bottom right, #2b2f3a 0%, #8179FF 100%); /* no-oklch fallback */
  }
  </style>
</head>
<body>

  <main class="send">
    <h1 class="line">to a random wikipedia page</h1>
  </main>

  <script>
  (function () {
    'use strict';
    var line = document.querySelector('.line');
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    var HOLD = 900;       // ms to read the text before the colour starts
    var FLOOD_MS = 2100;  // ms for the OKLCH spectrum to flood the letters
    var SETTLE = 350;     // ms to sit on the full-colour text before leaving

    // where we go. Resolve a specific random article up front so the jump is one
    // hop (snappier than Special:Random's redirect); fall back to Special:Random.
    var DEST = 'https://en.wikipedia.org/wiki/Special:Random';
    fetch('https://en.wikipedia.org/w/api.php?action=query&list=random&rnnamespace=0&rnlimit=1&format=json&origin=*')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var t = d.query.random[0].title;
        DEST = 'https://en.wikipedia.org/wiki/' + encodeURIComponent(t.replace(/ /g, '_'));
      })
      .catch(function () { /* keep Special:Random */ });

    // Wattenberger's exact fill; S is the sweeping mid hint.
    function grad(S) {
      return 'linear-gradient(to bottom right in oklch increasing hue, '
           + 'oklch(6% 0.3 91) 0% 0%, ' + S.toFixed(1) + '%, #8179FF 92% 100%)';
    }
    line.style.backgroundImage = grad(84);   // rest state

    function go() { window.location.replace(DEST); }   // real navigation, Back returns to the site

    if (reduce) {
      line.style.backgroundImage = grad(24);
      setTimeout(go, HOLD + 700);
    } else {
      var start = null;
      function frame(ts) {
        if (start === null) start = ts;
        var el = ts - start;
        if (el < HOLD) { requestAnimationFrame(frame); return; }
        var t = Math.min(1, (el - HOLD) / FLOOD_MS);
        var e = t * t * (3 - 2 * t);            // smoothstep
        line.style.backgroundImage = grad(84 - e * 78);   // 84% -> 6%
        if (t < 1) requestAnimationFrame(frame);
        else setTimeout(go, SETTLE);
      }
      requestAnimationFrame(frame);
    }
  })();
  </script>
</body>
</html>
