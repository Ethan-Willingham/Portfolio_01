<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Leaving portal lab</title>
  <link rel="preload" href="assets/fonts/century_supra_a_bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="style.css">
  <style>
  /* ============================================================
     LEAVING PORTAL LAB  (throwaway, noindex)
     The "Feeling lucky?" send-off as an AUTO-scroll portal, built to
     Amelia Wattenberger's exact colour recipe (wattenberger.com):

       - big static serif "to a random wikipedia page", no letters moving
       - her literal text fill: linear-gradient(to bottom right IN OKLCH
         INCREASING HUE, oklch(6% 0.3 91) 0% 0%, <S>%, #8179FF 92% 100%)
       - the mid hint S = 84 - min(261, scroll)*0.3 rides the scroll, so
         the OKLCH spectrum floods the letters

     Flow: load -> hold a beat on the text -> it AUTO-scrolls itself
     down (the text pins + floods, then lifts) -> lands on a live, real
     Wikipedia article and LOCKS (no scrolling back up to the send-off;
     Wikipedia itself still scrolls; the browser Back button leaves).

     Font: site Century Supra (the three-font rule holds). The article
     is a real embed (article pages send no X-Frame-Options /
     frame-ancestors); a random title is resolved via the CORS API and
     loaded directly (Special:Random's 302 aborts in a frame). The URL
     stays on this site; the "open on Wikipedia" pill is the real
     full-URL hand-off.
     ============================================================ */

  html { background: var(--bg, #303931); }
  body { margin: 0; padding: 0; background: var(--bg, #303931); }

  .scene { position: relative; height: 200vh; height: 200svh; }
  .pin { position: sticky; top: 0; height: 100vh; height: 100svh;
         display: grid; place-items: center; padding: 8vh 6vw; box-sizing: border-box;
         background: var(--bg, #303931); overflow: hidden; }

  .line {
    margin: 0; max-width: 16ch; text-align: center; text-wrap: balance;
    font-family: century_supra_a, 'Century Schoolbook', Georgia, serif;
    font-weight: 700; font-size: clamp(2.7rem, 12vw, 10rem); line-height: 0.95; letter-spacing: -0.02em;
    color: transparent; -webkit-text-fill-color: transparent;
    -webkit-background-clip: text; background-clip: text; background-repeat: no-repeat;
    background-image: linear-gradient(to bottom right, #2b2f3a 0%, #8179FF 100%); /* no-oklch fallback */
  }

  .wikiwrap { position: relative; height: 100vh; height: 100svh; background: var(--bg, #303931); }
  .wiki { position: relative; z-index: 1; width: 100%; height: 100%; border: 0; display: block; background: transparent; }
  .wikiwrap::before { /* a held breath while the random article loads */
    content: 'opening a random page'; position: absolute; inset: 0; display: grid; place-items: center;
    font-family: var(--font-mono, monospace); font-size: 0.8rem; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--text-faint, #a4a293); z-index: 0; }

  /* locked: the article fills the screen, the send-off is gone, the page can't scroll */
  body.landed { overflow: hidden; }
  body.landed .scene { display: none; }
  body.landed .wikiwrap { position: fixed; inset: 0; height: 100vh; height: 100dvh; }

  .wiki-open { position: fixed; right: 1rem; bottom: 1rem; z-index: 10; opacity: 0; pointer-events: none;
    transition: opacity .4s ease; font-family: var(--font-mono, ui-monospace, monospace); font-size: 0.72rem;
    letter-spacing: 0.05em; color: var(--bg, #303931); background: var(--accent, #d4c4a0); text-decoration: none;
    padding: 0.5em 0.95em; border-radius: 999px; box-shadow: 0 3px 12px rgba(0,0,0,0.3); }
  body.landed .wiki-open { opacity: 0.92; pointer-events: auto; }
  .wiki-open:hover { filter: brightness(1.08); }
  </style>
</head>
<body>

  <div class="scene">
    <div class="pin">
      <h1 class="line">to a random wikipedia page</h1>
    </div>
  </div>

  <section class="wikiwrap">
    <iframe class="wiki" title="A random Wikipedia article" loading="eager"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
    <a class="wiki-open" id="wikiOpen" href="https://en.wikipedia.org/wiki/Special:Random"
       target="_top" rel="noopener">open on Wikipedia &#8599;</a>
  </section>

  <script>
  (function () {
    'use strict';
    var line   = document.querySelector('.line');
    var scene  = document.querySelector('.scene');
    var iframe = document.querySelector('.wiki');
    var openLink = document.getElementById('wikiOpen');
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    var HOLD = 1100;       // ms to sit on the text before it moves
    var SCROLL_MS = 3200;  // ms for the auto-scroll down to Wikipedia

    // Wattenberger's exact text fill, mid hint S driven by scroll position.
    function grad(S) {
      return 'linear-gradient(to bottom right in oklch increasing hue, '
           + 'oklch(6% 0.3 91) 0% 0%, ' + S.toFixed(1) + '%, #8179FF 92% 100%)';
    }
    function paint() {
      var vh = window.innerHeight || 1;
      var pinned = Math.max(1, scene.offsetHeight - vh);
      var p = Math.min(1, Math.max(0, window.scrollY / (pinned * 0.8)));
      line.style.backgroundImage = grad(84 - Math.min(261, p * 261) * 0.3);
    }

    // --- block manual scrolling during the show (programmatic scroll still works) ---
    function block(e) { e.preventDefault(); }
    function blockKeys(e) { if ([32,33,34,35,36,38,40].indexOf(e.keyCode) >= 0) e.preventDefault(); }
    function lockInput() {
      window.addEventListener('wheel', block, { passive: false });
      window.addEventListener('touchmove', block, { passive: false });
      window.addEventListener('keydown', blockKeys);
    }
    function freeInput() {
      window.removeEventListener('wheel', block, { passive: false });
      window.removeEventListener('touchmove', block, { passive: false });
      window.removeEventListener('keydown', blockKeys);
    }

    function land() {
      document.body.classList.add('landed');  // fixed full-screen article, no scroll back up
      window.scrollTo(0, 0);
      freeInput();                             // let Wikipedia scroll for reading; Back leaves
    }

    function easeInOut(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }

    // --- the auto-scroll: hold, then ease the page down to the article, then lock ---
    var start = null, targetY = 0;
    function step(ts) {
      if (start === null) { start = ts; targetY = document.documentElement.scrollHeight - window.innerHeight; }
      var el = ts - start;
      if (el < HOLD) { requestAnimationFrame(step); return; }
      var t = Math.min(1, (el - HOLD) / SCROLL_MS);
      window.scrollTo(0, Math.round(targetY * easeInOut(t)));
      paint();
      if (t < 1) requestAnimationFrame(step); else land();
    }

    function run() {
      paint();
      lockInput();
      if (reduce) {                            // no motion: hold, flood in place, then land
        line.style.backgroundImage = grad(6);
        setTimeout(land, HOLD + 300);
      } else {
        requestAnimationFrame(step);
      }
    }

    // resolve a random article via the CORS API; load it directly (no 302); aim the
    // hand-off link at it. Use location.replace so the embed adds no history entry
    // (Back leaves the portal, not the iframe).
    function go(url) {
      try { iframe.contentWindow.location.replace(url); }
      catch (e) { iframe.src = url; }
    }
    fetch('https://en.wikipedia.org/w/api.php?action=query&list=random&rnnamespace=0&rnlimit=1&format=json&origin=*')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var t = d.query.random[0].title;
        var url = 'https://en.wikipedia.org/wiki/' + encodeURIComponent(t.replace(/ /g, '_'));
        go(url); if (openLink) openLink.href = url;
      })
      .catch(function () { go('https://en.wikipedia.org/wiki/Special:Random'); });

    window.addEventListener('resize', paint);
    window.scrollTo(0, 0);
    run();
  })();
  </script>
</body>
</html>
