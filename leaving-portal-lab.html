<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Leaving portal lab</title>
  <link rel="preload" href="assets/fonts/century_supra_a_bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preconnect" href="https://en.wikipedia.org">
  <link rel="dns-prefetch" href="https://en.wikipedia.org">
  <link rel="stylesheet" href="style.css">
  <style>
  /* ============================================================
     LEAVING PORTAL LAB  (throwaway, noindex)
     The "Feeling lucky?" send-off, frosted-glass version.

     - big BOLD ALL-CAPS Century Supra line, bespoke OKLCH spectral fill
       (deep indigo -> warm gold, swept the warm way via "increasing hue")
     - an ARROW invites the scroll; the USER scrolls / swipes down to
       reveal the destination article. As they scroll, the words go up,
       the frosted article comes up from below, and the colour rides the
       scroll: it floods + rotates by the GOLDEN ANGLE (137.508deg),
       finishing at the golden-ratio point (61.8%) of the roll
     - the article is behind FROSTED GLASS; reaching the bottom resolves
       onto the REAL wikipedia.org page (real URL, Back returns here)

     Font: site Century Supra (three-font rule holds).
     ============================================================ */

  html, body { margin: 0; padding: 0; background: var(--bg, #303931); }

  .send { position: relative; height: 100vh; height: 100svh;
          display: grid; place-items: center; padding: 8vh 5vw; box-sizing: border-box;
          background: var(--bg, #303931); }
  .line {
    margin: 0; max-width: 13ch; text-align: center; text-wrap: balance;
    font-family: century_supra_a, 'Century Schoolbook', Georgia, serif;
    font-weight: 700; text-transform: uppercase;
    font-size: clamp(3rem, 13.5vw, 12.5rem); line-height: 0.9; letter-spacing: -0.005em;
    color: transparent; -webkit-text-fill-color: transparent;
    -webkit-background-clip: text; background-clip: text; background-repeat: no-repeat;
    background-image: linear-gradient(200deg, #2b2f3a 0%, #e7b663 100%); /* no-oklch fallback */
  }

  /* the arrow cue */
  .arrow { position: absolute; left: 50%; bottom: 5.5vh; transform: translateX(-50%);
           display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
           color: var(--accent, #d4c4a0); pointer-events: none; }
  .arrow span { font-family: var(--font-mono, ui-monospace, monospace);
                font-size: 0.72rem; letter-spacing: 0.3em; text-transform: uppercase; }
  .arrow svg { width: 26px; height: auto; display: block; animation: bob 1.8s ease-in-out infinite; }
  .arrow path { fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  @keyframes bob { 0%,100% { transform: translateY(0); opacity: 0.6; } 50% { transform: translateY(5px); opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .arrow svg { animation: none; } }

  /* the destination, revealed behind frosted glass */
  .wikiwrap { position: relative; height: 100vh; height: 100svh; background: var(--bg, #303931); overflow: hidden; }
  .wiki { position: absolute; inset: -5%; width: 110%; height: 110%; border: 0; display: block;
          filter: blur(14px) saturate(1.05) brightness(1.03); transform: translateZ(0); pointer-events: none; }
  .frost { position: absolute; inset: 0; pointer-events: none;
           background:
             radial-gradient(120% 90% at 50% 0%, rgba(245,241,234,0.12), transparent 55%),
             linear-gradient(180deg, rgba(48,57,49,0.10), rgba(48,57,49,0.20));
           -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); }
  </style>
</head>
<body>

  <section class="send">
    <h1 class="line">to a random wikipedia page</h1>
    <div class="arrow" aria-hidden="true">
      <span>scroll</span>
      <svg viewBox="0 0 26 16"><path d="M3 3 L13 13 L23 3"/></svg>
    </div>
  </section>

  <section class="wikiwrap">
    <iframe class="wiki" title="" aria-hidden="true" tabindex="-1"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
    <div class="frost"></div>
  </section>

  <script>
  (function () {
    'use strict';
    var line  = document.querySelector('.line');
    var arrow = document.querySelector('.arrow');
    var iframe = document.querySelector('.wiki');

    // ---- golden ratio ----
    var PHI = 1.6180339887498949;
    var GOLD = 360 / (PHI * PHI);     // golden angle, 137.50776 deg
    var ANGLE0 = 200;                 // bespoke base angle
    var FLOOD_AT = 1 / PHI;           // colour fully floods at 61.8% of the scroll

    // ---- bespoke spectral fill: deep indigo -> warm gold, swept the warm way ----
    function grad(angle, S) {
      return 'linear-gradient(' + angle.toFixed(2) + 'deg in oklch increasing hue, '
           + 'oklch(18% 0.15 290) 0% 0%, ' + S.toFixed(1) + '%, oklch(80% 0.175 85) 92% 100%)';
    }

    // destination + frosted preview (direct article; Special:Random's 302 aborts in a frame)
    var DEST = 'https://en.wikipedia.org/wiki/Special:Random';
    fetch('https://en.wikipedia.org/w/api.php?action=query&list=random&rnnamespace=0&rnlimit=1&format=json&origin=*')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var t = d.query.random[0].title;
        DEST = 'https://en.wikipedia.org/wiki/' + encodeURIComponent(t.replace(/ /g, '_'));
        iframe.src = DEST;
      })
      .catch(function () { /* keep Special:Random; leave the frosted panel plain green */ });

    var navigated = false;
    function onScroll() {
      var max = document.documentElement.scrollHeight - window.innerHeight;
      var p = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;   // 0..1 scroll progress
      var cp = Math.min(1, p / FLOOD_AT);                                     // colour flood, tied to scroll
      line.style.backgroundImage = grad(ANGLE0 + cp * GOLD, 84 - cp * 78);
      if (arrow) arrow.style.opacity = Math.max(0, 1 - p * 2.4).toFixed(2);
      if (p >= 0.92 && !navigated) {                                          // reached the article -> the real page
        navigated = true;
        setTimeout(function () { window.location.replace(DEST); }, 260);
      }
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    window.scrollTo(0, 0);
    onScroll();   // rest colour at the top
  })();
  </script>
</body>
</html>
