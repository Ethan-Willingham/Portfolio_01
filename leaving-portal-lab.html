<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Leaving portal lab</title>
  <link rel="preload" href="assets/fonts/century_supra_a_bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preconnect" href="https://en.wikipedia.org">
  <link rel="dns-prefetch" href="https://en.wikipedia.org">
  <link rel="stylesheet" href="style.css">
  <style>
  /* ============================================================
     LEAVING PORTAL LAB  (throwaway, noindex)
     The "Feeling lucky?" send-off, frosted-glass version.

     Flow:
       1. full green screen, static Century Supra line, the OKLCH
          spectrum floods the text in place (Wattenberger's exact fill:
          linear-gradient(to bottom right in oklch increasing hue,
          oklch(6% 0.3 91), <S 84->6>%, #8179FF))
       2. the screen AUTO-scrolls up to reveal the destination wiki
          article underneath, behind FROSTED GLASS (the iframe is
          blurred + tinted, so no harsh white and any content is soft)
       3. it then resolves onto the REAL wikipedia.org article
          (location.replace) - real URL, readable, Back returns here.

     The frosted preview is a brief, blurred, transient embed; you end
     on the genuine page. Font: site Century Supra (three-font rule).
     ============================================================ */

  html, body { margin: 0; padding: 0; background: var(--bg, #303931); }

  .scene { position: relative; height: 200vh; height: 200svh; }
  .pin { position: sticky; top: 0; height: 100vh; height: 100svh;
         display: grid; place-items: center; padding: 8vh 6vw; box-sizing: border-box;
         background: var(--bg, #303931); overflow: hidden; }
  .line {
    margin: 0; max-width: 16ch; text-align: center; text-wrap: balance;
    font-family: century_supra_a, 'Century Schoolbook', Georgia, serif;
    font-weight: 700; font-size: clamp(2.7rem, 12vw, 10rem); line-height: 0.95; letter-spacing: -0.02em;
    color: transparent; -webkit-text-fill-color: transparent;
    -webkit-background-clip: text; background-clip: text; background-repeat: no-repeat;
    background-image: linear-gradient(to bottom right, #2b2f3a 0%, #8179FF 100%); /* no-oklch fallback */
  }

  /* the destination, revealed behind frosted glass */
  .wikiwrap { position: relative; height: 100vh; height: 100svh; background: var(--bg, #303931); overflow: hidden; }
  .wiki { position: absolute; inset: -5%; width: 110%; height: 110%; border: 0; display: block;
          filter: blur(14px) saturate(1.05) brightness(1.03); transform: translateZ(0); pointer-events: none; }
  .frost { position: absolute; inset: 0; pointer-events: none;
           background:
             radial-gradient(120% 90% at 50% 0%, rgba(245,241,234,0.12), transparent 55%),
             linear-gradient(180deg, rgba(48,57,49,0.10), rgba(48,57,49,0.20));
           -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); }
  </style>
</head>
<body>

  <div class="scene">
    <div class="pin">
      <h1 class="line">to a random wikipedia page</h1>
    </div>
  </div>

  <section class="wikiwrap">
    <iframe class="wiki" title="" aria-hidden="true" tabindex="-1"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
    <div class="frost"></div>
  </section>

  <script>
  (function () {
    'use strict';
    var line   = document.querySelector('.line');
    var scene  = document.querySelector('.scene');
    var iframe = document.querySelector('.wiki');
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    var HOLD = 800;       // read the text
    var FLOOD_MS = 1800;  // OKLCH floods the text in place
    var SCROLL_MS = 1300; // auto-scroll up to reveal the frosted article
    var SETTLE = 850;     // sit on the frosted article before resolving to the real one

    // destination + frosted preview. Resolve a direct article up front (Special:Random's
    // 302 aborts in a frame); preview the SAME article blurred, then really go to it.
    var DEST = 'https://en.wikipedia.org/wiki/Special:Random';
    fetch('https://en.wikipedia.org/w/api.php?action=query&list=random&rnnamespace=0&rnlimit=1&format=json&origin=*')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var t = d.query.random[0].title;
        DEST = 'https://en.wikipedia.org/wiki/' + encodeURIComponent(t.replace(/ /g, '_'));
        iframe.src = DEST;   // frosted preview of the page they are going to
      })
      .catch(function () { /* keep Special:Random; leave the frosted panel as plain green */ });

    function grad(S) {
      return 'linear-gradient(to bottom right in oklch increasing hue, '
           + 'oklch(6% 0.3 91) 0% 0%, ' + S.toFixed(1) + '%, #8179FF 92% 100%)';
    }
    line.style.backgroundImage = grad(84);

    // block manual scrolling during the show (programmatic scroll still works)
    function block(e) { e.preventDefault(); }
    function blockKeys(e) { if ([32,33,34,35,36,38,40].indexOf(e.keyCode) >= 0) e.preventDefault(); }
    window.addEventListener('wheel', block, { passive: false });
    window.addEventListener('touchmove', block, { passive: false });
    window.addEventListener('keydown', blockKeys);

    function go() { window.location.replace(DEST); }
    function easeInOut(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }

    if (reduce) {
      line.style.backgroundImage = grad(6);
      setTimeout(go, HOLD + FLOOD_MS);
      return;
    }

    var start = null, targetY = 0;
    function loop(ts) {
      if (start === null) { start = ts; targetY = document.documentElement.scrollHeight - window.innerHeight; }
      var el = ts - start;
      if (el < HOLD) { requestAnimationFrame(loop); return; }
      var fe = el - HOLD;
      if (fe < FLOOD_MS) {                                   // phase 1: flood the text in place
        var tf = fe / FLOOD_MS, ef = tf * tf * (3 - 2 * tf);
        line.style.backgroundImage = grad(84 - ef * 78);
        requestAnimationFrame(loop); return;
      }
      line.style.backgroundImage = grad(6);
      var se = fe - FLOOD_MS;
      if (se < SCROLL_MS) {                                  // phase 2: scroll up to the frosted article
        window.scrollTo(0, Math.round(targetY * easeInOut(se / SCROLL_MS)));
        requestAnimationFrame(loop); return;
      }
      window.scrollTo(0, targetY);
      setTimeout(go, SETTLE);                                // phase 3: resolve onto the real article
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
