<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sluice — Audio Lab</title>
<style>
  :root { --bg:#0c0f14; --panel:#13181f; --panel2:#10151b; --line:#262e39; --ink:#cdd6e0;
    --dim:#8089; --dim2:#7c8794; --accent:#e8c14a; --red:#c8553a; --good:#6fae6a; --blue:#67a8e3; }
  * { box-sizing:border-box; }
  html,body { margin:0; min-height:100%; background:var(--bg); color:var(--ink);
    font-family:'Commit Mono', ui-monospace, Consolas, monospace; font-size:12px; }
  a { color:var(--accent); text-decoration:none; }

  /* ---- top bar ---- */
  #top { display:flex; align-items:center; gap:18px; padding:11px 16px; border-bottom:1px solid var(--line);
    background:var(--panel); position:sticky; top:0; z-index:5; flex-wrap:wrap; }
  #top h1 { font-size:14px; margin:0; letter-spacing:.04em; }
  #top .sub { color:var(--dim2); font-size:11px; }
  #top .spacer { flex:1 1 auto; }
  .masterbox { display:flex; align-items:center; gap:9px; }
  .masterbox label { color:var(--dim2); }
  /* meter */
  #meter { width:172px; height:30px; background:#0a0d12; border:1px solid var(--line); border-radius:5px; }

  /* ---- 3-column layout ---- */
  #main { display:flex; align-items:stretch; gap:0; min-height:calc(100vh - 54px); }
  #tracks { flex:0 0 214px; border-right:1px solid var(--line); background:var(--panel2);
    padding:11px 10px 40px; overflow-y:auto; }
  #work { flex:1 1 auto; min-width:0; padding:14px 18px 50px; overflow-y:auto; }
  #prompt { flex:0 0 360px; border-left:1px solid var(--line); background:var(--panel2);
    padding:13px 14px 50px; overflow-y:auto; }
  /* narrow screens: stack the three columns instead of squeezing the center flat */
  @media (max-width: 980px) {
    #main { flex-direction:column; }
    #tracks, #prompt { flex:1 1 auto; border:0; border-top:1px solid var(--line); }
    #tracks { order:0; } #work { order:1; } #prompt { order:2; }
  }

  h2 { font-size:11px; text-transform:uppercase; letter-spacing:.10em; color:var(--dim2); margin:0 0 9px; font-weight:normal; }
  .group { border-top:1px solid var(--line); margin-top:15px; padding-top:13px; }
  .group:first-child { border-top:0; margin-top:0; padding-top:0; }

  /* track list */
  .trk { display:block; width:100%; text-align:left; font:inherit; font-size:11px; color:var(--dim);
    background:transparent; border:1px solid transparent; border-radius:6px; padding:6px 8px; margin:1px 0; cursor:pointer; }
  .trk:hover { background:#1a212b; color:var(--ink); }
  .trk.on { background:#221f12; border-color:var(--accent); color:var(--accent); }
  .trk .k { color:var(--dim2); font-size:10px; }
  .trk.on .k { color:var(--accent); opacity:.8; }

  /* buttons */
  button { font:inherit; font-size:11px; color:var(--ink); background:#1c232d; border:1px solid var(--line);
    border-radius:7px; padding:7px 11px; cursor:pointer; }
  button:hover { border-color:#3a4658; background:#222b36; }
  button.on { border-color:var(--accent); color:var(--accent); background:#221f12; }
  button.primary { border-color:#3c6b3a; color:#cfe9cd; background:#16241a; }
  button.primary:hover { background:#1b2e1f; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .row.tight { gap:6px; }

  /* transport */
  #transport { display:flex; gap:9px; align-items:center; flex-wrap:wrap; margin-bottom:6px; }
  .trkhead { font-size:13px; color:var(--ink); margin:0 0 2px; letter-spacing:.02em; }
  .trkmeta { color:var(--dim2); font-size:11px; margin:0 0 13px; line-height:1.5; }
  .pill { font-size:10px; color:var(--dim2); border:1px solid var(--line); border-radius:20px; padding:2px 9px; }
  .pill.k { color:var(--accent); border-color:#4a431f; }

  /* slot rack */
  .slot { display:flex; align-items:center; gap:11px; padding:9px 11px; margin:7px 0;
    background:#11161d; border:1px solid var(--line); border-radius:9px; }
  .slot.empty { border-style:dashed; opacity:.82; }
  .slot.drag { border-color:var(--accent); background:#1b1d14; }
  .slot .lab { flex:0 0 116px; min-width:0; }
  .slot .lab .nm { color:var(--ink); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .slot .lab .fn { color:var(--dim2); font-size:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .slot canvas.wf { flex:1 1 auto; height:38px; min-width:80px; background:#0a0d12;
    border:1px solid #1d242e; border-radius:5px; cursor:pointer; }
  .slot .ctrls { flex:0 0 auto; display:flex; align-items:center; gap:7px; }
  .slot .ctrls .fader { width:84px; accent-color:var(--accent); }
  .sbtn { font-size:10px; padding:4px 7px; border-radius:5px; }
  .sbtn.solo.on { border-color:var(--accent); color:var(--accent); background:#221f12; }
  .sbtn.mute.on { border-color:var(--red); color:#e7a18e; background:#241612; }
  .dur { color:var(--dim2); font-size:10px; min-width:34px; text-align:right; }

  /* context tests */
  .slider { margin:9px 0; }
  .slider .lab { display:flex; justify-content:space-between; color:var(--dim2); margin-bottom:3px; font-size:11px; }
  .slider .lab b { color:var(--ink); font-weight:normal; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .seg { display:flex; gap:5px; flex-wrap:wrap; }
  .seg button { padding:5px 9px; font-size:10px; }
  .hint { color:var(--dim2); font-size:11px; line-height:1.6; margin:7px 0 0; }
  .hint b { color:var(--ink); font-weight:normal; }

  /* prompt panel */
  .pfield { margin:0 0 12px; }
  .pfield .ph { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .pfield .ph span { color:var(--dim2); font-size:10px; text-transform:uppercase; letter-spacing:.08em; }
  .pfield .ph button { font-size:10px; padding:3px 8px; }
  .pfield pre { margin:0; white-space:pre-wrap; word-break:break-word; background:#0c1117; border:1px solid var(--line);
    border-radius:7px; padding:9px 10px; color:#bcc6d2; font-size:11px; line-height:1.55; }
  .kv { display:flex; gap:8px; font-size:11px; color:var(--dim2); margin:3px 0; }
  .kv b { color:var(--ink); font-weight:normal; }
  .copied { color:var(--good) !important; border-color:#3c6b3a !important; }
  .foot { color:var(--dim2); font-size:10px; line-height:1.6; margin-top:18px; border-top:1px solid var(--line); padding-top:11px; }
</style>
</head>

  var TRACKS = [

    { id:'town-piano', tag:'PNO', name:'Town — piano · KEEPER', kind:'candidates', n:6,
      meta:'KEEPER (landed). The spine: title screen + the source motif every other theme quotes. Lock the winner as a Suno Persona and build everything from it. Pick the strongest hummable head.',
      model:'Suno v4.5', sliders:'Weirdness 30, Style Influence 75', key:'D minor · 80 BPM',
      style:'late-night jazz piano trio, warm and unhurried, instrumental only no vocals,\nlyrical acoustic grand piano melody, impressionistic extended chords,\nupright bass walking quietly, soft brushed drums,\nclean warm 1960s studio recording, natural room reverb, hi-fi and present,\nseamless loop no buildup no drop, 80 BPM, D minor',
      lyrics:'[Instrumental Intro: solo acoustic piano, sparse, four bars, low register]\n[Main: piano states a slow modal melody, lyrical right hand, sparse left hand, upright bass and brushed drums underneath]\n[Bridge: stripped to solo piano, very quiet, rubato]\n[Outro: piano alone, last chord hangs unresolved, soft reverb tail]\n[Minimal Variation] [Sustained]',
      exclude:'vocals, humming, choir, scat, vinyl crackle, tape hiss, lo-fi, distortion, fuzz, distorted guitar, rock, EDM, synth lead, modern pop production, crescendo, drop, fanfare, soaring, trumpet, saxophone, brass' },

    { id:'town-trombone', tag:'TBN', name:'Town — trombone · KEEPER', kind:'candidates', n:6,
      meta:'KEEPER (landed). Quotes the motif in F minor. The sauntering warmth of Hiroshi Suzuki "Cat". Trombone over Rhodes.',
      model:'Suno v4.5', sliders:'Weirdness 30, Style Influence 75', key:'F minor · 86 BPM',
      style:'late-night jazz, warm and sauntering, instrumental only no vocals,\nmellow trombone melody, Fender Rhodes comping, upright bass,\nsoft brushed drums with light ride cymbal,\nclean warm 1970s studio recording, natural room reverb, hi-fi and present,\nseamless loop no buildup no drop, 86 BPM, F minor',
      lyrics:'[Instrumental Intro: Fender Rhodes vamp, four bars]\n[Main: mellow trombone states the melody, sauntering, over Rhodes with upright bass and brushes]\n[Bridge: Rhodes and bass only, quiet]\n[Outro: trombone holds a long note, last chord unresolved, soft reverb tail]\n[Minimal Variation] [Sustained]',
      exclude:'vocals, humming, choir, scat, vinyl crackle, tape hiss, lo-fi, distortion, fuzz, distorted guitar, rock, EDM, synth lead, modern pop production, crescendo, drop, fanfare, soaring, trumpet, saxophone' },

    { id:'town-violin', tag:'VLN', name:'Town — violin · KEEPER', kind:'candidates', n:6,
      meta:'KEEPER (landed). Grappelli / Briscoe color, intimate not orchestral (that is why the string-section excludes matter). Motif in A minor. If it reads classical, add "swung, behind the beat".',

      style:'late-night jazz, warm and lyrical, instrumental only no vocals,\nsinging solo jazz violin melody, warm acoustic piano comping,\nupright bass walking quietly, soft brushed drums,\nclean warm studio recording, natural room reverb, hi-fi and present,\nseamless loop no buildup no drop, 76 BPM, A minor',
      lyrics:'[Instrumental Intro: solo piano, sparse, four bars]\n[Main: jazz violin states the melody, warm and singing, over piano with upright bass and brushes]\n[Bridge: violin and piano only, very quiet]\n[Outro: violin sustains, last chord hangs unresolved, soft reverb tail]\n[Minimal Variation] [Sustained]',

      style:'warm soul-jazz, smoky and laid-back, instrumental only no vocals,\nHammond organ melody with gentle Leslie, soft clean guitar comping,\nupright bass, brushed drums,\nclean warm 1960s studio recording, natural room reverb,\nseamless loop no buildup no drop, 92 BPM, F minor',

    { id:'town-sax', tag:'SAX', name:'Town — tenor sax · candidate (riskiest)', kind:'candidates', n:6,
      meta:'CANDIDATE (de-cheesed, the most at-risk). Cool modal, dark-toned tenor, restrained, minimal vibrato. The Coltrane "Equinox" tone, not a love theme. Sax is the cheesiest instrument for AI; push Weirdness up and pick the take with grit.',

      style:'cool modal jazz, hushed and understated, instrumental only no vocals,\ndark-toned tenor saxophone woody and restrained, sparse phrasing behind the beat, minimal vibrato,\nwarm acoustic piano comping, upright bass walking quietly, soft brushed drums,\nclean warm 1960s studio recording, natural room reverb, intimate,\nseamless loop no buildup no drop, 80 BPM, C minor',
      lyrics:'[Instrumental Intro: solo piano, sparse, four bars]\n[Main: dark-toned tenor saxophone states a restrained modal theme, sparse and behind the beat, leaving space, no wail, over piano with upright bass and brushes]\n[Bridge: sax and piano only, quiet]\n[Outro: a final soft phrase, last chord unresolved, reverb tail]\n[Minimal Variation] [Sustained]',
      exclude:'vocals, humming, choir, scat, vinyl crackle, tape hiss, lo-fi, distortion, fuzz, distorted guitar, rock, EDM, synth lead, modern pop production, crescendo, drop, fanfare, soaring, trumpet, trombone, smooth jazz, elevator music, lounge, easy listening, Kenny G, soprano saxophone, smooth sax, sultry sax, romantic, sentimental, adult contemporary, soft rock, vibrato wail, saxophone solo, squealing' },

    { id:'travel1', tag:'R1', name:'Travel 1 — lonesome glide', kind:'candidates', n:5,
      meta:'Flagship open-road cue (Khruangbin). Day or night. Plays then goes silent for minutes, then another cue.',
      model:'Suno v4.5', sliders:'Weirdness 35, Style Influence 80', key:'E dorian · 88 BPM',

    { id:'travel2', tag:'R2', name:'Travel 2 — easy amble', kind:'candidates', n:5,

    // ----- UNDERGROUND (one shared 4-layer bed, ride faders for the depth crossfade) -----
    { id:'underground', tag:'UG', name:'Underground bed (4 layers)', kind:'stems',

  ];

  // depth presets — bible §5.6 (lowpass on the bus tied to depth).
  var DEPTHS = [
    { name:'Surface', hz:20000 }, { name:'Shallow', hz:14000 }, { name:'Mid', hz:11000 },
    { name:'Deep', hz:7000 }, { name:'Deepest', hz:5000 }
  ];
  // duck presets — bible §5.5.
  var DUCKS = [
    { name:'Standard (-9dB)', amt:0.35, atk:0.06, rel:0.6 },
    { name:'Hard (-18dB)',    amt:0.12, atk:0.05, rel:1.5 },
    { name:'Gentle (-3dB)',   amt:0.70, atk:0.10, rel:0.8 }
  ];

  // ============================================================
  // Audio graph (bible §5.1) — built lazily on first gesture.
  // musicBus -> musicDuck -> depthFilter -> master -> analyser -> destination
  // ============================================================
  var AC=null, master, musicBus, musicDuck, depthFilter, analyser, meterBuf;
  function ensureAudio(){
    if (AC) { if (AC.state==='suspended') AC.resume(); return; }
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain();      master.gain.value = parseFloat(masterFader.value);
    analyser = AC.createAnalyser(); analyser.fftSize = 2048; meterBuf = new Float32Array(analyser.fftSize);
    depthFilter = AC.createBiquadFilter(); depthFilter.type='lowpass'; depthFilter.frequency.value=20000; depthFilter.Q.value=0.7;
    musicDuck = AC.createGain();   musicDuck.gain.value = 1;
    musicBus = AC.createGain();    musicBus.gain.value = 1;
    musicBus.connect(musicDuck); musicDuck.connect(depthFilter); depthFilter.connect(master);
    master.connect(analyser); analyser.connect(AC.destination);
    requestAnimationFrame(meterLoop);
  }

  // ============================================================
  // State
  // ============================================================
  var curId = TRACKS[0].id;
  var slots = [];          // { name, buffer, src, gain, gainVal, muted, solo, fileName, peaks, dur }
  var playing = false, looping = true;
  var loopStart = 0, loopEnd = 0;   // seconds; 0/0 = full buffer

  function curTrack(){ for (var i=0;i<TRACKS.length;i++) if (TRACKS[i].id===curId) return TRACKS[i]; }

  function slotLabels(t){
    if (t.kind==='stems') return t.stems.slice();
    var out=[]; for (var i=0;i<t.n;i++) out.push('Take '+(i+1)); return out;
  }

  function buildSlots(){
    stopAll();
    var t = curTrack(), labs = slotLabels(t);
    slots = labs.map(function(nm){ return { name:nm, buffer:null, src:null, gain:null,
      gainVal:1, muted:false, solo:false, fileName:'', peaks:null, dur:0 }; });
    loopStart = 0; loopEnd = 0;
    looping = (t.id!=='death' && t.id!=='stinger' && t.id!=='event'); // one-shots default to no loop
  }

  // ============================================================
  // File load + decode + waveform peaks
  // ============================================================
  function loadFileIntoSlot(slot, file){
    ensureAudio();
    slot.fileName = file.name;
    file.arrayBuffer().then(function(ab){ return AC.decodeAudioData(ab.slice(0)); })
      .then(function(buf){
        slot.buffer = buf; slot.dur = buf.duration; slot.peaks = computePeaks(buf, 220);
        renderRack();
        if (playing){ startSlot(slot, AC.currentTime+0.03); applyGains(0.04); }
      })
      .catch(function(err){ slot.fileName = 'decode failed: '+file.name; slot.buffer=null; renderRack(); });
  }
  function computePeaks(buf, cols){
    var ch = buf.getChannelData(0), n = ch.length, step = Math.max(1, Math.floor(n/cols)), out = [];
    for (var i=0;i<cols;i++){
      var s=i*step, e=Math.min(n, s+step), mn=1, mx=-1;
      for (var j=s;j<e;j++){ var v=ch[j]; if (v<mn)mn=v; if (v>mx)mx=v; }
      out.push([mn,mx]);
    }
    return out;
  }

  // ============================================================
  // Transport
  // ============================================================
  function anySolo(){ for (var i=0;i<slots.length;i++) if (slots[i].solo) return true; return false; }
  function effGain(slot){
    if (anySolo()) return slot.solo ? slot.gainVal : 0;
    return slot.muted ? 0 : slot.gainVal;
  }
  function startSlot(slot, at){
    if (!slot.buffer) return;
    if (slot.src) { try { slot.src.stop(); } catch(e){} }
    var s = AC.createBufferSource(); s.buffer = slot.buffer; s.loop = looping;
    if (looping && loopEnd > loopStart){ s.loopStart = loopStart; s.loopEnd = loopEnd; }
    var g = AC.createGain(); g.gain.value = effGain(slot);
    s.connect(g); g.connect(musicBus);
    s.start(at, looping ? loopStart : 0);
    slot.src = s; slot.gain = g;
  }
  function playAll(){
    ensureAudio();
    var at = AC.currentTime + 0.08; playing = true;
    slots.forEach(function(s){ startSlot(s, at); });
    syncTransport();
  }
  function stopAll(){
    playing = false;
    slots.forEach(function(s){ if (s.src){ try{s.src.stop();}catch(e){} s.src=null; } });
    syncTransport();
  }
  function applyGains(fade){
    if (!AC) return; var t = AC.currentTime;
    slots.forEach(function(s){ if (!s.gain) return;
      var tgt = effGain(s);
      s.gain.gain.cancelScheduledValues(t);
      s.gain.gain.setValueAtTime(s.gain.gain.value, t);
      s.gain.gain.linearRampToValueAtTime(tgt, t + (fade||0.08));
    });
  }
  function jumpToSeam(){            // audition the loop wrap fast (bible §2.4)
    if (!AC || !playing) return;
    var end = loopEnd>loopStart ? loopEnd : maxDur();
    if (!end) return;
    var off = Math.max(0, end - 1.4), at = AC.currentTime + 0.03;
    slots.forEach(function(s){
      if (!s.buffer) return; if (s.src){ try{s.src.stop();}catch(e){} }
      var ns = AC.createBufferSource(); ns.buffer = s.buffer; ns.loop = looping;
      if (looping && loopEnd>loopStart){ ns.loopStart=loopStart; ns.loopEnd=loopEnd; }
      var g = AC.createGain(); g.gain.value = effGain(s);
      ns.connect(g); g.connect(musicBus); ns.start(at, off); s.src=ns; s.gain=g;
    });
  }
  function maxDur(){ var m=0; slots.forEach(function(s){ if (s.dur>m) m=s.dur; }); return m; }

  // ============================================================
  // Context processing
  // ============================================================
  function setDepth(hz){ if (!AC) return; depthFilter.frequency.linearRampToValueAtTime(hz, AC.currentTime+0.25); }
  function doDuck(d){
    if (!AC) return; var t = AC.currentTime;
    musicDuck.gain.cancelScheduledValues(t);
    musicDuck.gain.setValueAtTime(musicDuck.gain.value, t);
    musicDuck.gain.linearRampToValueAtTime(d.amt, t + d.atk);
    musicDuck.gain.linearRampToValueAtTime(1.0, t + d.atk + d.rel);
  }

  // ============================================================
  // Meter (bible §5.11 — eyeball -18 to -20 target, -1 dBTP ceiling)
  // ============================================================
  var mc = document.getElementById('meter'), mctx = mc.getContext('2d');
  var peakHold = -90, peakHoldT = 0;
  function meterLoop(){
    requestAnimationFrame(meterLoop);
    var w=mc.width, h=mc.height; mctx.clearRect(0,0,w,h);
    mctx.fillStyle='#0a0d12'; mctx.fillRect(0,0,w,h);
    // target zone -18..-20 and ceiling -1
    function x(db){ return (1 - (-db)/60) * w; } // 0dB at right, -60 at left
    mctx.fillStyle='rgba(111,174,106,0.14)'; mctx.fillRect(x(-20),0,x(-18)-x(-20),h);
    mctx.strokeStyle='rgba(200,85,58,0.5)'; mctx.beginPath(); mctx.moveTo(x(-1),0); mctx.lineTo(x(-1),h); mctx.stroke();
    var peak=0, sum=0;
    if (AC && analyser){
      analyser.getFloatTimeDomainData(meterBuf);
      for (var i=0;i<meterBuf.length;i++){ var v=meterBuf[i]; var a=Math.abs(v); if (a>peak)peak=a; sum+=v*v; }
    }
    var rms = Math.sqrt(sum/(meterBuf?meterBuf.length:1)) || 0;
    var peakDb = peak>0 ? 20*Math.log10(peak) : -90;
    var rmsDb  = rms>0  ? 20*Math.log10(rms)  : -90;
    if (peakDb>peakHold){ peakHold=peakDb; peakHoldT=performance.now(); }
    else if (performance.now()-peakHoldT>900){ peakHold=Math.max(peakDb, peakHold-0.6); }
    // bars
    var ph=Math.round(h*0.46);
    mctx.fillStyle = peakDb>-1 ? '#c8553a' : '#6fae6a';
    mctx.fillRect(0,2,Math.max(0,x(peakDb)),ph-3);
    mctx.fillStyle = '#67a8e3';
    mctx.fillRect(0,ph+1,Math.max(0,x(rmsDb)),h-ph-3);
    // peak-hold tick
    mctx.fillStyle='#e8c14a'; mctx.fillRect(Math.max(0,x(peakHold))-1,2,2,ph-3);
    // labels
    mctx.fillStyle='#7c8794'; mctx.font='9px Commit Mono, monospace'; mctx.textAlign='left';
    mctx.fillText('pk '+(peakDb<=-90?'-inf':peakDb.toFixed(1)), 4, 11);
    mctx.fillText('rms '+(rmsDb<=-90?'-inf':rmsDb.toFixed(1)), 4, h-4);
  }

  // ============================================================
  // Rendering — left track list

      // drag-drop
      row.ondragover = function(e){ e.preventDefault(); row.classList.add('drag'); };
      row.ondragleave = function(){ row.classList.remove('drag'); };
      row.ondrop = function(e){ e.preventDefault(); row.classList.remove('drag');
        var f = e.dataTransfer.files && e.dataTransfer.files[0]; if (f) loadFileIntoSlot(slot, f); };

      var lab = el('div',{class:'lab'});
      lab.appendChild(el('div',{class:'nm'}, slot.name));
      lab.appendChild(el('div',{class:'fn'}, slot.fileName || 'drop audio / click wave'));
      row.appendChild(lab);

      var cv = el('canvas',{class:'wf'}); cv.width=440; cv.height=38;
      cv.onclick = function(){ pickFile(slot); };
      row.appendChild(cv);
      drawWave(cv, slot);

      var ctrls = el('div',{class:'ctrls'});
      ctrls.appendChild(el('span',{class:'dur'}, slot.dur?fmtDur(slot.dur):'—'));
      var solo = el('button',{class:'sbtn solo'+(slot.solo?' on':'')}, 'S');
      solo.title='solo'; solo.onclick=function(){ slot.solo=!slot.solo; applyGains(0.05); renderRack(); };
      var mute = el('button',{class:'sbtn mute'+(slot.muted?' on':'')}, 'M');
      mute.title='mute'; mute.onclick=function(){ slot.muted=!slot.muted; applyGains(0.05); renderRack(); };
      var fader = el('input',{type:'range', class:'fader', min:'0', max:'1', step:'0.01'}); fader.value=slot.gainVal;
      fader.oninput=function(){ slot.gainVal=parseFloat(fader.value); applyGains(0.03); };
      ctrls.appendChild(solo); ctrls.appendChild(mute); ctrls.appendChild(fader);
      row.appendChild(ctrls);
      rack.appendChild(row);
    });
    // animate playheads
    if (!renderRack._raf){ renderRack._raf = true; requestAnimationFrame(playheadLoop); }
  }

  function drawWave(cv, slot){
    var x = cv.getContext('2d'), w=cv.width, h=cv.height, mid=h/2;
    x.clearRect(0,0,w,h);
    if (!slot.peaks){ x.fillStyle='#1a212b'; x.fillRect(0,mid,w,1);
      x.fillStyle='#3a4450'; x.font='10px Commit Mono, monospace'; x.textAlign='center';
      x.fillText('empty', w/2, mid+3); return; }
    // loop region shading
    if (slot.dur){
      var ls = loopStart, le = loopEnd>loopStart ? loopEnd : slot.dur;
      var xs = (ls/slot.dur)*w, xe = (le/slot.dur)*w;
      x.fillStyle='rgba(232,193,74,0.10)'; x.fillRect(xs,0,Math.max(1,xe-xs),h);
    }
    x.strokeStyle = slot.solo ? '#e8c14a' : slot.muted ? '#4a4450' : '#5a7fa0';
    x.beginPath();
    for (var i=0;i<slot.peaks.length;i++){
      var px=(i/slot.peaks.length)*w, p=slot.peaks[i];
      x.moveTo(px, mid - p[1]*mid*0.92); x.lineTo(px, mid - p[0]*mid*0.92);
    }
    x.stroke();
  }

  function playheadLoop(){
    requestAnimationFrame(playheadLoop);
    if (!playing || !AC) return;
    var rack = document.getElementById('rack'); if (!rack) return;
    var canvases = rack.querySelectorAll('canvas.wf');
    slots.forEach(function(slot, i){
      var cv = canvases[i]; if (!cv || !slot.buffer || !slot.src) return;
      drawWave(cv, slot);
      // approximate position: time since start modulo loop window
      var dur = slot.dur, ls = loopStart, le = loopEnd>loopStart?loopEnd:dur, win = le-ls;
      if (win<=0) return;
      var x = cv.getContext('2d'), w=cv.width, h=cv.height;
      var pos = ls + ((AC.currentTime*1) % win); // coarse; visual aid only
      var px = (pos/dur)*w;
      x.strokeStyle='rgba(255,255,255,0.5)'; x.beginPath(); x.moveTo(px,0); x.lineTo(px,h); x.stroke();
    });
  }

  function wireWorkControls(){
    var ls = document.getElementById('ls'), le = document.getElementById('le'),
        apply = document.getElementById('ltApply'), depthHz = document.getElementById('depthHz'),
        depthVal = document.getElementById('depthVal');
    if (apply) apply.onclick = function(){
      loopStart = Math.max(0, parseFloat(ls.value)||0);
      loopEnd = Math.max(0, parseFloat(le.value)||0);
      renderRack(); if (playing) playAll();
    };
    if (depthHz) depthHz.oninput = function(){ var hz=parseInt(depthHz.value,10); depthVal.textContent=hz+' Hz'; setDepth(hz); };
  }
  function setSlider(id, v){ var s=document.getElementById(id); if (s){ s.value=v; var lab=document.getElementById('depthVal'); if (lab) lab.textContent=v+' Hz'; } }
  function markActive(seg, btn){ seg.querySelectorAll('button').forEach(function(b){ b.classList.remove('on'); }); btn.classList.add('on'); }

  function syncTransport(){
    var b = document.getElementById('playBtn'); if (b) b.textContent = playing ? '■ Stop' : '▶ Play all';
  }

  // hidden file input reused for click-to-pick
  var picker = document.createElement('input'); picker.type='file'; picker.accept='audio/*'; picker.style.display='none';
  document.body.appendChild(picker);
  var pickTarget=null;
  picker.onchange = function(){ var f=picker.files&&picker.files[0]; if (f&&pickTarget) loadFileIntoSlot(pickTarget,f); picker.value=''; };
  function pickFile(slot){ pickTarget=slot; picker.click(); }

  // ============================================================
  // Rendering — right prompt panel
  // ============================================================
  function renderPrompt(){
    var t = curTrack(), host = document.getElementById('prompt'); host.innerHTML='';
    host.appendChild(el('h2',{},'Suno prompt · system §5'));
    host.appendChild(el('div',{class:'trkhead'}, t.tag+'  '+t.name));
    var kv = el('div',{}); kv.style.margin='6px 0 14px';
    kv.appendChild(kvRow('Model', t.model));
    kv.appendChild(kvRow('Sliders', t.sliders));
    kv.appendChild(kvRow('Key/tempo', t.key));
    host.appendChild(kv);

    var useNote = el('div',{class:'hint'},'Into Suno Custom mode: paste the three boxes below that have copy buttons (Style of Music, Lyrics, Exclude Styles), and set the Model + Sliders (above) in Suno too. The Post-process and Export notes at the bottom are Reaper and game-build steps, NOT Suno input.');
    useNote.style.margin = '0 0 14px'; host.appendChild(useNote);

    host.appendChild(pfield('Style of Music', t.style));
    host.appendChild(pfield('Lyrics', t.lyrics));
    host.appendChild(pfield('Exclude Styles', t.exclude));

    var fp = el('div',{class:'group'});
    fp.appendChild(el('h2',{},'Post-process · system §8'));
    fp.appendChild(el('div',{class:'hint'},
      'Reaper steps AFTER you download the take, not Suno input. Trim to a clean musical phrase, '+
      'crossfade 50 to 100 ms at the seam. Gentle high-shelf above 12 kHz (+1 to 2 dB) for air, do not roll off the top. '+
      'Light bus-glue compression only, no pumping. Optional very subtle micro-pitch drift (plus or minus 5 cents). '+
      'For the four town themes, overlay one live Fiverr instrument: the copyrightability lever, and it keeps clean from sounding sterile. '+
      'No vinyl crackle, no tape hiss, no bitcrush. If a take sounds dusty, re-roll it.'));
    host.appendChild(fp);

    var ex = el('div',{class:'group'});
    ex.appendChild(el('h2',{},'Export · system §8.4'));
    ex.appendChild(el('div',{class:'hint'},
      '.webm Opus 96 kbps for the web build, mono for vertical-layer stems (half the browser memory), '+
      '.wav kept locally. Target -18 to -20 LUFS integrated, -1 dBTP ceiling.'));
    host.appendChild(ex);
  }
  function kvRow(k,v){ var d=el('div',{class:'kv'}); d.appendChild(el('span',{},k)); d.appendChild(el('b',{},v)); return d; }
  function pfield(label, text){
    var w = el('div',{class:'pfield'});
    var ph = el('div',{class:'ph'});
    ph.appendChild(el('span',{},label));
    var cp = el('button',{}, 'copy');
    cp.onclick = function(){ navigator.clipboard.writeText(text).then(function(){
      cp.textContent='copied'; cp.classList.add('copied'); setTimeout(function(){ cp.textContent='copy'; cp.classList.remove('copied'); },1100); }); };
    ph.appendChild(cp); w.appendChild(ph);
    var pre = el('pre',{}); pre.textContent = text; w.appendChild(pre);
    return w;
  }

  // ============================================================
  // helpers + boot
  // ============================================================
  function el(tag, attrs, text){ var e=document.createElement(tag); for (var k in attrs) e.setAttribute(k, attrs[k]); if (text!=null) e.textContent=text; return e; }
  function fmtDur(s){ return s>=10 ? s.toFixed(1)+'s' : s.toFixed(2)+'s'; }
  function renderAll(){ renderTrackList(); renderWork(); renderPrompt(); }

  document.getElementById('masterFader').oninput = function(){ if (master) master.gain.value=parseFloat(this.value); };
  // iOS / autoplay unlock
  ['pointerdown','keydown','touchstart'].forEach(function(ev){ window.addEventListener(ev, ensureAudio, {once:false}); });
  window.addEventListener('keydown', function(e){ if (e.key===' '){ e.preventDefault(); playing?stopAll():playAll(); } });

  buildSlots(); renderAll();
})();
</script>
</body>
</html>
