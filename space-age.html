  <title>How Old Are You in Space?</title>
  <meta name="description" content="Enter your birthday and see your age on every planet. A year on Mercury is 88 days; on Neptune it is 165 of ours, so you are a different age on each. Runs in your browser.">

  <style>
    /* ============================================================
       SPACE-AGE  ·  a cinematic, mobile-first single-purpose page.
       One question, one input, then the answer reveals. Deep-space
       canvas; the site's three faces and gold accent carry the brand.
       ============================================================ */
    /* The page is rigid side to side: no horizontal pan, no rubber-banding.
       clip (where supported) avoids creating a scroll container at all. */
    html, body {
      overflow-x: hidden;
      overflow-x: clip;
      overscroll-behavior-x: none;
    }
    .sa-page {
      --ink:    #f4f0e7;
      --dim:    #aeb4a9;
      --faint:  #8e958b;
      --gold:   #e0cd9c;
      --gold-2: #f1e3bd;
      --line:   rgba(244, 240, 231, 0.12);
      background:
        radial-gradient(120% 80% at 50% -10%, #18241f 0%, rgba(12, 17, 14, 0) 55%),
        radial-gradient(90% 60% at 85% 8%, rgba(70, 92, 120, 0.16) 0%, rgba(12, 17, 14, 0) 50%),
        #0a0e0c;
      background-attachment: fixed;
      color: var(--ink);
    }
    /* A faint, fixed starfield behind everything. Pure CSS, no requests.
       Two interleaved layers breathe on different slow cycles (7.5s and 11s,
       never in sync), and each carries one slightly larger star with a soft
       halo that glints as its layer brightens. One layer also drifts a few
       pixels over two minutes, felt more than seen. Opacity and transform
       only, so it all stays on the compositor and costs nothing on mobile. */
    .sa-page::before,
    .sa-page::after {
      content: "";
      position: fixed;
      inset: -28px 0;   /* headroom top and bottom so the drifting layers never bare an edge */
      z-index: 0;
      pointer-events: none;
    }
    .sa-page::before {
      background-image:
        radial-gradient(1.4px 1.4px at 12% 18%, rgba(255,255,255,0.75), transparent 100%),
        radial-gradient(1.1px 1.1px at 27% 62%, rgba(255,255,255,0.5), transparent 100%),
        radial-gradient(1.6px 1.6px at 41% 12%, rgba(255,255,255,0.65), transparent 100%),
        radial-gradient(1px 1px at 54% 78%, rgba(255,255,255,0.45), transparent 100%),
        radial-gradient(1.5px 1.5px at 66% 33%, rgba(255,255,255,0.6), transparent 100%),
        radial-gradient(1px 1px at 8% 84%, rgba(255,255,255,0.4), transparent 100%),
        radial-gradient(1.3px 1.3px at 95% 55%, rgba(255,255,255,0.55), transparent 100%),
        radial-gradient(1.2px 1.2px at 33% 90%, rgba(255,255,255,0.5), transparent 100%),
        radial-gradient(2.2px 2.2px at 88% 22%, rgba(255,250,235,0.9), transparent 100%),
        radial-gradient(7px 7px at 88% 22%, rgba(255,245,220,0.18), transparent 100%);
      animation:
        sa-twinkle-a 6s ease-in-out infinite,
        sa-drift-up 170s ease-in-out infinite alternate;
    }
    .sa-page::after {
      background-image:
        radial-gradient(1.2px 1.2px at 20% 38%, rgba(255,255,255,0.55), transparent 100%),
        radial-gradient(1.6px 1.6px at 36% 74%, rgba(255,255,255,0.6), transparent 100%),
        radial-gradient(1px 1px at 47% 47%, rgba(255,255,255,0.4), transparent 100%),
        radial-gradient(1.4px 1.4px at 61% 64%, rgba(255,255,255,0.6), transparent 100%),
        radial-gradient(1.1px 1.1px at 73% 9%, rgba(255,255,255,0.5), transparent 100%),
        radial-gradient(1.5px 1.5px at 81% 82%, rgba(255,255,255,0.6), transparent 100%),
        radial-gradient(1px 1px at 5% 47%, rgba(255,255,255,0.45), transparent 100%),
        radial-gradient(1.2px 1.2px at 92% 38%, rgba(255,255,255,0.5), transparent 100%),
        radial-gradient(1px 1px at 19% 40%, rgba(255,255,255,0.4), transparent 100%),
        radial-gradient(2px 2px at 14% 72%, rgba(235,245,255,0.85), transparent 100%),
        radial-gradient(6px 6px at 14% 72%, rgba(220,235,255,0.16), transparent 100%);
      animation:
        sa-twinkle-b 9.5s ease-in-out -4s infinite,
        sa-drift 140s ease-in-out infinite alternate;
    }
    /* asymmetric stops so the breathing never feels metronomic */
    @keyframes sa-twinkle-a {
      0%, 100% { opacity: 0.3; }
      45%      { opacity: 1; }
      70%      { opacity: 0.55; }
    }
    @keyframes sa-twinkle-b {
      0%, 100% { opacity: 0.95; }
      40%      { opacity: 0.3; }
      75%      { opacity: 0.7; }
    }
    /* the two layers slide gently apart and back, a parallax you feel more than see */
    @keyframes sa-drift {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(0, 16px, 0); }
    }
    @keyframes sa-drift-up {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(0, -12px, 0); }
    }

    /* Shooting stars: two thin streaks that cross the sky every so often,
       offset on coprime cycles so the moment never repeats. Pure transform
       and opacity, visible well under a second per pass. */
    .sa-sky {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .sa-sky::before,
    .sa-sky::after {
      content: "";
      position: absolute;
      width: 110px;
      height: 1.5px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,250,235,0.85) 60%, rgba(255,255,255,0));
      box-shadow: 0 0 6px rgba(255,250,235,0.3);
      opacity: 0;
    }
    .sa-sky::before {
      top: 14%;
      left: 72%;
      animation: sa-streak-a 13s linear 4s infinite;
    }
    .sa-sky::after {
      top: 56%;
      left: 88%;
      width: 90px;
      animation: sa-streak-b 21s linear 11s infinite;
    }
    @keyframes sa-streak-a {
      0%   { opacity: 0; transform: rotate(-28deg) translateX(0); }
      2.5% { opacity: 0.65; }
      6%   { opacity: 0; transform: rotate(-28deg) translateX(-320px); }
      100% { opacity: 0; transform: rotate(-28deg) translateX(-320px); }
    }
    @keyframes sa-streak-b {
      0%   { opacity: 0; transform: rotate(-38deg) translateX(0); }
      1.6% { opacity: 0.5; }
      4%   { opacity: 0; transform: rotate(-38deg) translateX(-380px); }
      100% { opacity: 0; transform: rotate(-38deg) translateX(-380px); }
    }
    .sa-page .site-wrapper { position: relative; z-index: 1; }

    /* keep the back link legible on the dark canvas */
    .sa-page .post-back { color: var(--faint); }
    .sa-page .post-back:hover { color: var(--ink); }

    /* ---------------- HERO ---------------- */
    /* The hero reads as three acts: the title block (kicker hugging the
       headline, dek close beneath), the input, and the answer. Tight
       spacing inside each group, a full breath between them. */
    .sa-hero {
      position: relative;
      min-height: 82svh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem 0 2rem;
    }
    /* a soft warm glow sitting behind the headline */
    .sa-hero::after {
      content: "";
      position: absolute;
      z-index: -1;
      left: 50%;
      top: 44%;
      transform: translate(-50%, -50%);
      width: min(100%, 560px);
      height: 440px;
      background: radial-gradient(closest-side, rgba(224, 205, 156, 0.12), rgba(224, 205, 156, 0) 78%);
      pointer-events: none;
    }
    .sa-eyebrow {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
    }
    .sa-h1 {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: clamp(2.7rem, 12vw, 4.6rem);
      line-height: 1.02;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-wrap: balance;
      margin: 0.85rem 0 0;
    }
    .sa-hook {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: clamp(1.05rem, 4.4vw, 1.3rem);
      line-height: 1.4;
      color: var(--dim);
      max-width: 22ch;
      margin: 1.1rem 0 0;
    }

    /* ---- The birthday input: three typed fields, fast on mobile ---- */
    .sa-bday { margin-top: 2.4rem; }
    .sa-fields {
      display: inline-flex;
      align-items: flex-end;
      gap: 0.35rem;
      padding: 0.2rem 0.2rem 0;
    }
    .sa-field { display: flex; flex-direction: column; align-items: center; }
    .sa-field input {
      width: 2.4ch;
      box-sizing: content-box;
      font-family: var(--font-mono);
      font-size: clamp(2rem, 9vw, 2.9rem);
      font-variant-numeric: tabular-nums;
      text-align: center;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--line);
      padding: 0.1em 0.05em 0.12em;
      caret-color: var(--gold);
      transition: border-color 0.2s, color 0.2s;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 0;
    }
    .sa-field.yr input { width: 4.6ch; }
    .sa-field input::placeholder { color: var(--faint); opacity: 0.55; }
    .sa-field input:focus {
      outline: none;
      border-bottom-color: var(--gold);
    }
    .sa-field input.filled { color: var(--gold-2); }
    .sa-sep {
      font-family: var(--font-mono);
      font-size: clamp(1.6rem, 7vw, 2.3rem);
      color: var(--faint);
      /* lift the slash off the label row so it sits against the numerals */
      margin-bottom: 1.55rem;
      user-select: none;
    }
    .sa-field-label {
      font-family: var(--font-body);
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--faint);
      margin-top: 0.5rem;
    }
    .sa-hint {
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--faint);
      margin: 1.1rem 0 0;
      transition: color 0.2s;
    }
    .sa-hint.err { color: #e0a08f; }

    /* your next space birthday: the payoff line, big enough to be the
       second thing you read after the headline */
    .sa-soon {
      margin: 2.1rem 0 0;
      max-width: 20ch;
      text-align: center;
      text-wrap: balance;
      font-family: var(--font-heading);
      font-style: italic;
      font-size: clamp(1.35rem, 6vw, 1.7rem);
      line-height: 1.4;
      color: var(--ink);
      opacity: 0;
      transition: opacity 0.7s ease 0.1s;
    }
    .sa-soon.on { opacity: 1; }
    .sa-soon b { font-style: normal; font-weight: 700; color: var(--gold-2); }

    /* ---------------- RESULTS ----------------
       scroll-margin keeps the Share button off the screen edge when the
       page auto-advances here after a birthday is typed. */
    .sa-results { padding-top: 0.5rem; scroll-margin-top: 1.25rem; }
    .sa-list { list-style: none; margin: 0; padding: 0; }
    .pl {
      display: grid;
      grid-template-columns: 3rem 1fr auto;
      align-items: center;
      gap: 0 1rem;
      padding: 0.95rem 0.25rem;
      border-top: 1px solid var(--line);
    }
    .pl-orb {
      position: relative;
      width: 2.75rem;
      height: 2.75rem;
    }
    .pl-img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 2px 10px rgba(0,0,0,0.45);
      background: #0d1210;
    }
    .pl.is-birthday .pl-img {
      box-shadow: 0 0 0 2px var(--gold), 0 0 18px rgba(224, 205, 156, 0.5);
    }
    .pl-confetti {
      position: absolute;
      z-index: 2;
      inset: -0.7rem;
      pointer-events: none;
    }
    .pl-confetti i {
      --x: 50%;
      --delay: 0s;
      position: absolute;
      top: -0.15rem;
      left: var(--x);
      width: 3px;
      height: 6px;
      border-radius: 1px;
      background: var(--gold);
      opacity: 0;
      animation: pl-confetti-fall 1.7s linear var(--delay) infinite;
    }
    .pl-confetti i:nth-child(2n) { width: 5px; height: 3px; background: var(--gold-2); }
    .pl-confetti i:nth-child(3n) { background: var(--ink); }
    .pl-confetti i:nth-child(1) { --x: 8%;  --delay: -0.2s; }
    .pl-confetti i:nth-child(2) { --x: 23%; --delay: -1.1s; }
    .pl-confetti i:nth-child(3) { --x: 38%; --delay: -0.55s; }
    .pl-confetti i:nth-child(4) { --x: 52%; --delay: -1.45s; }
    .pl-confetti i:nth-child(5) { --x: 65%; --delay: -0.8s; }
    .pl-confetti i:nth-child(6) { --x: 78%; --delay: -1.6s; }
    .pl-confetti i:nth-child(7) { --x: 91%; --delay: -0.35s; }
    .pl-confetti i:nth-child(8) { --x: 31%; --delay: -1.3s; }
    .pl-confetti i:nth-child(9) { --x: 72%; --delay: -0.65s; }
    @keyframes pl-confetti-fall {
      0%   { opacity: 0; transform: translate3d(0, 0, 0) rotate(0deg); }
      12%  { opacity: 0.95; }
      85%  { opacity: 0.8; }
      100% { opacity: 0; transform: translate3d(0.35rem, 4.2rem, 0) rotate(300deg); }
    }
    .pl-name {
      font-family: var(--font-heading);
      font-size: 1.35rem;
      line-height: 1.1;
      color: var(--ink);
    }
    .pl-name .pl-tag {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.7rem;
      color: var(--faint);
      margin-left: 0.4em;
      vertical-align: 0.15em;
    }
    .pl-sub {
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--dim);
      line-height: 1.35;
      margin-top: 0.15rem;
    }
    .pl.is-birthday .pl-sub { color: var(--gold-2); font-weight: 600; }
    .pl-age { text-align: right; white-space: nowrap; }
    .pl-num {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-size: 1.85rem;
      line-height: 1;
      color: var(--gold-2);
    }
    .pl-unit {
      display: block;
      font-family: var(--font-body);
      font-size: 0.66rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      margin-top: 0.25rem;
    }

    /* reveal animation (respecting reduced motion, set in JS-friendly class) */
    .sa-rise { opacity: 0; transform: translateY(10px); }
    .sa-results.in .sa-rise { animation: sa-riseup 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes sa-riseup { to { opacity: 1; transform: none; } }

    /* ---- Share, sitting right above the planets ---- */
    .sa-share {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin: 0 0 1.7rem;
    }
    .sa-btn {
      font-family: var(--font-heading);
      font-size: 1.02rem;
      color: #0a0e0c;
      background: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 999px;
      padding: 0.7em 1.6em;
      min-height: 48px;
      cursor: pointer;
      transition: background 0.2s, transform 0.08s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(224, 205, 156, 0.18);
      white-space: nowrap;
    }
    .sa-btn:hover { background: var(--gold-2); box-shadow: 0 4px 26px rgba(224, 205, 156, 0.28); }
    .sa-btn:active { transform: translateY(1px); }
    .sa-btn.done { background: var(--gold-2); }
    .sa-btn--calendar {
      color: var(--gold-2);
      background: transparent;
      border-color: var(--line);
      box-shadow: none;
    }
    .sa-btn--calendar:hover {
      color: var(--ink);
      background: rgba(224, 205, 156, 0.08);
      border-color: var(--gold);
      box-shadow: none;
    }
    .sa-btn--calendar.done { color: #0a0e0c; border-color: var(--gold-2); }

    @media (prefers-reduced-motion: reduce) {
      .pl-confetti { display: none; }
    }

    .sa-page .site-footer-inner { border-top-color: var(--line); }
    .sa-page .site-footer a { color: var(--faint); }
    .sa-page .site-footer a:hover { color: var(--ink); }

    /* ---------------- larger screens ---------------- */
    @media (min-width: 680px) {
      .sa-hero { min-height: 76vh; }
      .sa-h1 { margin-top: 1rem; }
      .sa-hook { margin-top: 1.25rem; }
      .sa-bday { margin-top: 2.9rem; }
      .sa-hint { margin-top: 1.25rem; }
      .sa-soon { margin-top: 2.5rem; }
      .pl { grid-template-columns: 3.5rem 1fr auto; padding: 1.15rem 0.5rem; }
      .pl-orb { width: 3.2rem; height: 3.2rem; }
      .pl-name { font-size: 1.55rem; }
      .pl-sub { font-size: 0.9rem; }
      .pl-num { font-size: 2.3rem; }
    }

  </style>
</head>
<body class="sa-page">
  <div class="reading-progress" id="reading-progress" aria-hidden="true"></div>
  <div class="sa-sky" aria-hidden="true"></div>
  <div class="site-wrapper">

    <a href="/" class="post-back"><span class="pb-label">Home</span></a>

    <main>
      <!-- HERO: the whole 5-second pitch, nothing else competing. -->
      <section class="sa-hero">
        <p class="sa-eyebrow fade-in">A birthday calculator</p>
        <h1 class="sa-h1 fade-in" style="animation-delay:.05s">How old are you in space?</h1>
        <p class="sa-hook fade-in" style="animation-delay:.1s">A year isn't a year out there. Drop in your birthday.</p>

        <form class="sa-bday fade-in" id="sa-form" style="animation-delay:.15s" autocomplete="off" novalidate>
          <div class="sa-fields" role="group" aria-label="Your birthday">
            <span class="sa-field mo">
              <input id="sa-mo" type="text" inputmode="numeric" maxlength="2" placeholder="MM" aria-label="Birth month (1 to 12)">
              <span class="sa-field-label">Month</span>
            </span>
            <span class="sa-sep" aria-hidden="true">/</span>
            <span class="sa-field da">
              <input id="sa-da" type="text" inputmode="numeric" maxlength="2" placeholder="DD" aria-label="Birth day">
              <span class="sa-field-label">Day</span>
            </span>
            <span class="sa-sep" aria-hidden="true">/</span>
            <span class="sa-field yr">
              <input id="sa-yr" type="text" inputmode="numeric" maxlength="4" placeholder="YYYY" aria-label="Birth year">
              <span class="sa-field-label">Year</span>
            </span>
          </div>
        </form>
        <p class="sa-hint" id="sa-hint" aria-live="polite">Type the day you were born.</p>
        <p class="sa-soon" id="sa-soon" hidden></p>
      </section>

      <!-- RESULTS: revealed only once a birthday is in. -->
      <section class="sa-results" id="sa-results" hidden aria-live="polite">
        <div class="sa-share sa-rise">
          <button class="sa-btn" id="sa-share" type="button">Share</button>
          <button class="sa-btn sa-btn--calendar" id="sa-calendar" type="button">Add all to calendar</button>
        </div>
        <ol class="sa-list" id="sa-list"></ol>
      </section>

    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <a href="/">&copy; 2026 Ethan Willingham</a>
      </div>
    </footer>
  </div>

  <script>
  (function () {
    'use strict';

    var DAY_MS = 86400000;
    var YEAR_DAYS = 365.2425;
    var MONTH_DAYS = YEAR_DAYS / 12;

    // Earth uses the calendar year so its row matches the age you know; the rest
    // are sidereal orbital periods (Earth days) from NASA's planetary fact sheet.
    var BODIES = [
      { key:'mercury', name:'Mercury', days:87.969 },
      { key:'venus',   name:'Venus',   days:224.701 },
      { key:'earth',   name:'Earth',   days:365.2425, earth:true },
      { key:'mars',    name:'Mars',    days:686.980 },
      { key:'jupiter', name:'Jupiter', days:4332.589 },
      { key:'saturn',  name:'Saturn',  days:10759.22 },
      { key:'uranus',  name:'Uranus',  days:30685.4 },
      { key:'neptune', name:'Neptune', days:60189.0 },
      { key:'pluto',   name:'Pluto',   days:90560, tag:'dwarf planet' }
    ];
    var moEl = document.getElementById('sa-mo');
    var daEl = document.getElementById('sa-da');
    var yrEl = document.getElementById('sa-yr');
    var hintEl = document.getElementById('sa-hint');
    var resultsEl = document.getElementById('sa-results');
    var listEl = document.getElementById('sa-list');

    var reduceMotion = false; /* owner: animate for everyone, even with prefers-reduced-motion set */
    var shareMsg = '';
    var upcomingBirthdays = [];
    var soonEl = document.getElementById('sa-soon');

    // Big ages read as whole "years old"; small ones keep the decimal that is
    // the whole point (you are 0.15 of a year old on Pluto).
    function fmtAge(v) {
      if (v >= 10) return Math.floor(v).toLocaleString();
      if (v >= 1) { var s = v.toFixed(1); return s.slice(-2) === '.0' ? s.slice(0, -2) : s; }
      return v.toFixed(2);
    }
    function fmtUntil(ms) {
      var days = ms / DAY_MS;
      if (days < 1) return 'today';
      if (days < 45) { var d = Math.round(days); return 'in ' + d + (d === 1 ? ' day' : ' days'); }
      var mo = days / MONTH_DAYS;
      if (mo < 22) { var m = Math.round(mo); return 'in ' + m + (m === 1 ? ' month' : ' months'); }
      var yrs = days / YEAR_DAYS;
      if (yrs < 10) return 'in ' + yrs.toFixed(1) + ' years';
      return 'in ' + Math.round(yrs).toLocaleString() + ' years';
    }
    function fmtWhen(ms) {
      var when = fmtUntil(ms);
      if (when === 'in 1 month') return 'next month';
      if (when === 'in 1 day') return 'tomorrow';
      return when;
    }
    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() &&
             a.getMonth() === b.getMonth() &&
             a.getDate() === b.getDate();
    }
    function earthBirthdayInYear(birth, year) {
      var mo = birth.getMonth(), day = birth.getDate();
      var c = new Date(year, mo, day);
      // Treat Feb 28 as the birthday in non-leap years for a Feb 29 birth.
      if (c.getMonth() !== mo) c = new Date(year, mo + 1, 0);
      return c;
    }
    function earthBirthdayRecord(birth, ref) {
      var y = ref.getFullYear();
      var c = earthBirthdayInYear(birth, y);
      if (sameDay(c, ref)) return { date: c, n: y - birth.getFullYear(), isToday: true };
      if (c < ref) {
        c = earthBirthdayInYear(birth, y + 1);
        y += 1;
      }
      return { date: c, n: y - birth.getFullYear(), isToday: false };
    }
    function fmtDate(date) {
      return date.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }
    function dateAttr(date) {
      var mo = String(date.getMonth() + 1).padStart(2, '0');
      var day = String(date.getDate()).padStart(2, '0');
      return date.getFullYear() + '-' + mo + '-' + day;
    }

    function render(birth, user) {
      var nowT = Date.now();
      var nowDate = new Date(nowT);
      var birthMs = birth.getTime();
      var elapsedMs = nowT - birthMs;
      var elapsedDays = elapsedMs / DAY_MS;

      // Calculate once so the list and the headline agree on which birthday
      // comes next. Ties keep the solar-system order from BODIES.
      var birthdays = BODIES.map(function (b, order) {
        var nextN, nextDate, isToday = false;
        if (b.earth) {
          var earthRecord = earthBirthdayRecord(birth, nowDate);
          nextDate = earthRecord.date;
          nextN = earthRecord.n;
          isToday = earthRecord.isToday;
        } else {
          var completed = Math.floor(elapsedDays / b.days);
          var previousDate = new Date(birthMs + completed * b.days * DAY_MS);
          var followingDate = new Date(birthMs + (completed + 1) * b.days * DAY_MS);
          if (sameDay(previousDate, nowDate)) {
            nextN = completed;
            nextDate = previousDate;
            isToday = true;
          } else {
            nextN = completed + 1;
            nextDate = followingDate;
            isToday = sameDay(followingDate, nowDate);
          }
        }
        return {
          body: b,
          age: elapsedDays / b.days,
          nextN: nextN,
          nextDate: nextDate,
          isToday: isToday,
          order: order
        };
      }).sort(function (a, b) {
        if (a.isToday !== b.isToday) return a.isToday ? -1 : 1;
        return a.nextDate.getTime() - b.nextDate.getTime() || a.order - b.order;
      });
      upcomingBirthdays = birthdays.slice();

      // Planet rows, ordered by the soonest upcoming birthday.
      var rows = '';
      birthdays.forEach(function (item, i) {
        var b = item.body;
        var when = fmtWhen(item.nextDate.getTime() - nowT);
        var status = item.isToday
          ? 'Birthday today &middot; <time datetime="' + dateAttr(item.nextDate) + '">' + fmtDate(item.nextDate) + '</time>'
          : 'Next birthday &middot; <time datetime="' + dateAttr(item.nextDate) + '">' + fmtDate(item.nextDate) + '</time> &middot; ' + when;
        var confetti = item.isToday ? '<span class="pl-confetti" aria-hidden="true">' + '<i></i>'.repeat(9) + '</span>' : '';
        rows += '<li class="pl sa-rise' + (item.isToday ? ' is-birthday' : '') + '" style="animation-delay:' + (0.06 * i).toFixed(2) + 's">' +
                  '<div class="pl-orb"><img class="pl-img" src="assets/planets/' + b.key + '.jpg" width="160" height="160" loading="lazy" decoding="async" alt="">' + confetti + '</div>' +
                  '<div class="pl-main">' +
                    '<div class="pl-name">' + b.name +
                      (b.tag ? '<span class="pl-tag">' + b.tag + '</span>' : '') + '</div>' +
                    '<div class="pl-sub">' + status + '</div>' +
                  '</div>' +
                  '<div class="pl-age"><span class="pl-num">' + fmtAge(item.age) + '</span>' +
                    '<span class="pl-unit">years old</span></div>' +
                '</li>';
      });
      listEl.innerHTML = rows;

      // Your soonest upcoming birthday across the worlds: the line under the
      // input, and the message behind the Share button.
      var first = birthdays[0];
      var soonest = first ? { date: first.nextDate.getTime(), name: first.body.name, n: first.nextN, isToday: first.isToday } : null;
      if (soonest) {
        var soonWhen = fmtWhen(soonest.date - nowT);
        if (soonest.isToday) {
          shareMsg = "It's my birthday on " + soonest.name + ' today.';
          soonEl.innerHTML = 'Today is your birthday on <b>' + soonest.name + '</b>.';
        } else {
          shareMsg = "I'm turning " + soonest.n.toLocaleString() + ' on ' + soonest.name + ' ' + soonWhen + '.';
          soonEl.innerHTML = 'Your next space birthday is <b>' + soonWhen + '</b>, on <b>' + soonest.name + '</b>.';
        }
        soonEl.hidden = false;
        requestAnimationFrame(function () { soonEl.classList.add('on'); });
      } else {
        shareMsg = '';
        hideSoon();
      }
      reveal(user);
    }

    function reveal(user) {
      var firstTime = resultsEl.hidden;
      if (firstTime) {
        resultsEl.hidden = false;
        requestAnimationFrame(function () { resultsEl.classList.add('in'); });
      }
      // On the first valid birthday a person types, take them straight to the
      // payoff (dismiss the keyboard first so the scroll lands cleanly).
      if (firstTime && user) {
        if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
        setTimeout(function () {
          resultsEl.scrollIntoView({ behavior: reduceMotion ? 'auto' : 'smooth', block: 'start' });
        }, reduceMotion ? 0 : 140);
      }
    }

    // ---- input handling: digits only, auto-advance, compute when complete ----
    function clean(el, max) {
      var v = el.value.replace(/[^0-9]/g, '').slice(0, max);
      el.value = v;
      el.classList.toggle('filled', v.length === max);
      return v;
    }

    // The answer line never outlives its date: it hides the moment the
    // input stops being a valid birthday.
    function hideSoon() {
      soonEl.hidden = true;
      soonEl.classList.remove('on');
    }

    function tryCompute(silent, user) {
      var mo = moEl.value, da = daEl.value, yr = yrEl.value;
      if (!mo || !da || yr.length < 4) {
        hintEl.textContent = 'Type the day you were born.';
        hintEl.classList.remove('err');
        hintEl.hidden = false;
        hideSoon();
        return;
      }
      var m = +mo, d = +da, y = +yr;
      var now = new Date();
      var dt = new Date(y, m - 1, d);
      var valid = m >= 1 && m <= 12 && d >= 1 && d <= 31 && y >= 1900 &&
                  dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d;
      if (!valid) {
        hintEl.textContent = 'Hmm, that is not a real date.';
        hintEl.classList.add('err');
        hintEl.hidden = false;
        hideSoon();
        return;
      }
      if (dt > now) {
        hintEl.textContent = 'That is in the future. Time travel is not supported (yet).';
        hintEl.classList.add('err');
        hintEl.hidden = false;
        hideSoon();
        return;
      }
      hintEl.classList.remove('err');
      hintEl.hidden = true;
      try { localStorage.setItem('sa-birth', y + '-' + m + '-' + d); } catch (e) {}
      render(dt, user);
    }

    function wire(el, max, next) {
      el.addEventListener('input', function () {
        var v = clean(el, max);
        if (v.length === max && next) next.focus();
        tryCompute(true, true);
      });
      el.addEventListener('keydown', function (e) {
        if (e.key === 'Backspace' && el.value === '' && el.previousField) {
          el.previousField.focus();
        }
      });
      el.addEventListener('blur', function () { tryCompute(true, false); });
    }
    daEl.previousField = moEl;
    yrEl.previousField = daEl;
    wire(moEl, 2, daEl);
    wire(daEl, 2, yrEl);
    wire(yrEl, 4, null);

    // Restore a previous birthday (device only, never shared).
    try {
      var saved = localStorage.getItem('sa-birth');
      if (saved) {
        var p = saved.split('-');
        if (p.length === 3) {
          moEl.value = ('0' + p[1]).slice(-2); moEl.classList.add('filled');
          daEl.value = ('0' + p[2]).slice(-2); daEl.classList.add('filled');
          yrEl.value = p[0]; yrEl.classList.add('filled');
          tryCompute(true, false);
        }
      }
    } catch (e) {}

    // ---- sharing: the line plus the bare URL, which carries nothing ----
    // Native share sheet where the browser has one; otherwise the button
    // copies the message instead.
    var SHARE_URL = 'https://ethanwillingham.com/space-age.html';
    var shareBtn = document.getElementById('sa-share');
    shareBtn.addEventListener('click', function () {
      if (navigator.share) {
        navigator.share({
          title: 'How Old Are You in Space?',
          text: shareMsg || undefined,
          url: SHARE_URL
        }).catch(function () {});
        return;
      }
      copyText((shareMsg ? shareMsg + ' ' : '') + SHARE_URL, function (ok) {
        shareBtn.textContent = ok ? 'Copied!' : 'Copy failed';
        shareBtn.classList.toggle('done', ok);
        setTimeout(function () { shareBtn.textContent = 'Share'; shareBtn.classList.remove('done'); }, 1600);
      });
    });
    function copyText(text, cb) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () { cb(true); }, function () { cb(legacy(text)); });
      } else { cb(legacy(text)); }
    }
    function legacy(text) {
      try {
        var ta = document.createElement('textarea');
        ta.value = text; ta.setAttribute('readonly', '');
        ta.style.position = 'absolute'; ta.style.left = '-9999px';
        document.body.appendChild(ta); ta.select();
        var ok = document.execCommand('copy'); document.body.removeChild(ta);
        return ok;
      } catch (e) { return false; }
    }

    // One calendar file, with the next displayed birthday for every world.
    function ordinal(n) {
      var mod100 = n % 100;
      var suffix = 'th';
      if (mod100 < 11 || mod100 > 13) {
        if (n % 10 === 1) suffix = 'st';
        else if (n % 10 === 2) suffix = 'nd';
        else if (n % 10 === 3) suffix = 'rd';
      }
      return n + suffix;
    }
    function icsEscape(value) {
      return String(value).replace(/\\/g, '\\\\').replace(/\n/g, '\\n').replace(/,/g, '\\,').replace(/;/g, '\\;');
    }
    function icsDate(date) {
      return dateAttr(date).replace(/-/g, '');
    }
    function foldIcsLine(line) {
      var parts = [];
      while (line.length > 73) {
        parts.push(line.slice(0, 73));
        line = ' ' + line.slice(73);
      }
      parts.push(line);
      return parts.join('\r\n');
    }
    function buildCalendar() {
      var stamp = new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
      var lines = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//Ethan Willingham//Space Age//EN',
        'CALSCALE:GREGORIAN',
        'METHOD:PUBLISH',
        'X-WR-CALNAME:Space birthdays'
      ];
      upcomingBirthdays.forEach(function (item) {
        var start = icsDate(item.nextDate);
        var dayAfter = new Date(item.nextDate.getFullYear(), item.nextDate.getMonth(), item.nextDate.getDate() + 1);
        var birthdayName = item.nextN > 0 ? ordinal(item.nextN) + ' birthday' : 'birthday';
        lines.push(
          'BEGIN:VEVENT',
          'UID:space-age-' + item.body.key + '-' + start + '@ethanwillingham.com',
          'DTSTAMP:' + stamp,
          'DTSTART;VALUE=DATE:' + start,
          'DTEND;VALUE=DATE:' + icsDate(dayAfter),
          'SUMMARY:' + icsEscape('My ' + birthdayName + ' on ' + item.body.name),
          'DESCRIPTION:' + icsEscape('Calculated by How Old Are You in Space? ' + SHARE_URL),
          'URL:' + SHARE_URL,
          'STATUS:CONFIRMED',
          'TRANSP:TRANSPARENT',
          'END:VEVENT'
        );
      });
      lines.push('END:VCALENDAR');
      return lines.map(foldIcsLine).join('\r\n') + '\r\n';
    }

    var calendarBtn = document.getElementById('sa-calendar');
    calendarBtn.addEventListener('click', function () {
      if (!upcomingBirthdays.length) return;
      var blob = new Blob([buildCalendar()], { type:'text/calendar;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var link = document.createElement('a');
      link.href = url;
      link.download = 'my-space-birthdays.ics';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(function () { URL.revokeObjectURL(url); }, 0);
      calendarBtn.textContent = 'Calendar ready';
      calendarBtn.classList.add('done');
      setTimeout(function () {
        calendarBtn.textContent = 'Add all to calendar';
        calendarBtn.classList.remove('done');
      }, 1600);
    });

    // Desktop only: focus the first field so you can type at once. On touch we
    // leave it alone so the keyboard does not jump up unbidden.
    if (window.matchMedia && window.matchMedia('(pointer: fine)').matches) {
      moEl.focus();
    }
  })();
  </script>
  <script src="js/main.js"></script>
  <script src="js/backtotop.js"></script>
</body>
