<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Desktop tab mark: a green equilateral triangle on a rounded square in an
       off-white that sits between cream (#E8E2D6) and white (#FFFFFF). Corners
       outside the rounded square are transparent, so it reads as a rounded-square
       badge on the tab. Rounded square: 96x96 inset 2, corner radius 10.
       Triangle: equilateral, base 70 (x 15..85), centered (apex y 19.7,
       base y 80.3). Same mark as the mobile tile. -->
  <rect x="2" y="2" width="96" height="96" rx="10" ry="10" fill="#F5F1EA"/>
  <polygon points="50,19.7 15,80.3 85,80.3" fill="#303931"/>
</svg>
