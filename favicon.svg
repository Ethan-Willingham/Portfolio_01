<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Desktop tab mark: a green equilateral triangle inside a white disc.
       The triangle is concentric with the disc: its centroid (which, for an
       equilateral triangle, is also its circumcenter) sits at the circle center,
       so all three vertices are the same distance from the edge.
       Disc r 49, centered. Triangle circumradius 36 about (50,50):
         apex (50,14), base (18.82,68) and (81.18,68). -->
  <circle cx="50" cy="50" r="49" fill="#FFFFFF"/>
  <polygon points="50,14 18.82,68 81.18,68" fill="#303931"/>
</svg>
