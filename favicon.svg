<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Desktop tab mark: a green equilateral triangle inside a sand-colored disc.
       The filled circle gives the green triangle contrast on both light and dark
       tab strips, so no dark-mode color flip is needed (and a flip would turn the
       triangle tan, hiding it against the sand). Corners outside the circle are
       transparent, so it reads as a sand badge floating on the tab.
       Triangle: equilateral, base 60 (x 20..80), bounding box centered in the
       disc (apex y 24.04, base y 76). Disc: r 49, centered. -->
  <circle cx="50" cy="50" r="49" fill="#D4C4A0"/>
  <polygon points="50,24.04 20,76 80,76" fill="#303931"/>
</svg>
