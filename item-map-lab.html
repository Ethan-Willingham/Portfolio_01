<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sluice Item Map</title>
<style>
  :root{
    --bg:#0e1116; --bg2:#141925; --line:#222a38; --ink:#e8e6df; --dim:#8893a6;
    --ore:#cf9b3a; --liquid:#3f8fd0; --slime:#8ec63f; --refined:#e07a2c;
    --reaction:#d8456f; --component:#2bb6a0; --good:#cbb24b; --gear:#9a78dd;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:ui-monospace,'Commit Mono',Menlo,Consolas,monospace;overflow:hidden}
  #top{position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;
    gap:14px;padding:0 16px;background:linear-gradient(#141925,#0e1116);
    border-bottom:1px solid var(--line);z-index:30}
  #top h1{font-size:15px;margin:0;letter-spacing:.5px;font-weight:600}
  #top h1 small{color:var(--dim);font-weight:400;margin-left:8px;font-size:11px}
  #search{background:#0b0e13;border:1px solid var(--line);color:var(--ink);
    border-radius:5px;padding:6px 9px;font:inherit;font-size:12px;width:180px}
  #chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:11px;padding:4px 9px;border-radius:20px;border:1px solid var(--line);
    background:#0b0e13;color:var(--dim);cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px}
  .chip .sw{width:9px;height:9px;border-radius:50%}
  .chip.on{color:var(--ink)}
  .spacer{flex:1}
  .btn{font-size:11px;padding:5px 10px;border-radius:5px;border:1px solid var(--line);
    background:#0b0e13;color:var(--dim);cursor:pointer}
  .btn:hover{color:var(--ink);border-color:#3a465c}
  #stage{position:fixed;top:54px;left:0;right:0;bottom:0;cursor:grab}
  #stage.drag{cursor:grabbing}
  svg{width:100%;height:100%;display:block}
  text{pointer-events:none;font-family:inherit}
  .nlabel{font-size:7px;fill:var(--dim)}
  .tierhdr{font-size:12px;fill:#aeb7c7;letter-spacing:1px;text-transform:uppercase}
  .tiersub{font-size:8px;fill:#5c6678}
  .famlbl{font-size:10px;letter-spacing:.5px}
  .lane{fill:#11151e;stroke:#1b2230}
  .node{cursor:pointer}
  .node circle{stroke:#0a0d12;stroke-width:1}
  .edge{fill:none}
  #panel{position:fixed;top:66px;right:12px;width:288px;max-height:calc(100% - 80px);
    overflow:auto;background:rgba(16,20,28,.97);border:1px solid var(--line);border-radius:8px;
    padding:14px 15px;z-index:25;display:none;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  #panel h2{margin:0 0 2px;font-size:15px}
  #panel .meta{font-size:11px;color:var(--dim);margin-bottom:10px}
  #panel .val{font-size:13px;color:#f0d98a;font-weight:600}
  #panel h3{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;
    margin:12px 0 5px;border-top:1px solid var(--line);padding-top:9px}
  #panel ul{margin:0;padding:0;list-style:none}
  #panel li{font-size:12px;padding:3px 0;display:flex;justify-content:space-between;gap:8px}
  #panel li .q{color:var(--dim)}
  #panel .note{font-size:11px;color:#b9c0cc;font-style:italic;line-height:1.4}
  #panel .x{position:absolute;top:8px;right:11px;color:var(--dim);cursor:pointer;font-size:16px}
  #tip{position:fixed;pointer-events:none;background:#05070a;border:1px solid #2a3344;
    border-radius:5px;padding:5px 8px;font-size:11px;z-index:40;display:none;max-width:220px}
  #tip b{color:#fff}
  #legend{position:fixed;left:12px;bottom:12px;font-size:10px;color:var(--dim);z-index:20;
    background:rgba(14,17,22,.8);border:1px solid var(--line);border-radius:6px;padding:8px 10px;line-height:1.6}
  #legend b{color:var(--ink)}
</style>
</head>
<body>
<div id="top">
  <h1>SLUICE &middot; ITEM MAP <small>every item, by tier and family.</small></h1>
  <input id="search" placeholder="search items...">
  <div id="chips"></div>
  <div class="spacer"></div>
  <button class="btn" id="fit">fit</button>
  <button class="btn" id="zin">+</button>
  <button class="btn" id="zout">&minus;</button>
</div>
<div id="stage"><svg id="svg"></svg></div>
<div id="panel"><span class="x" id="px">&times;</span><div id="pbody"></div></div>
<div id="tip"></div>
<div id="legend">
  <b>read it:</b> columns = depth tier (left shallow, right deep). rows = family.<br>
  node size = value (log). lines = recipes (input flows to output).<br>
  hover a node to trace its connections, click for the full recipe.
</div>

  {id:'refined',  lbl:'Refined',       c:'#e07a2c'},
  {id:'reaction', lbl:'Reaction',      c:'#d8456f'},
  {id:'component',lbl:'Component',     c:'#2bb6a0'},
  {id:'good',     lbl:'Good (town)',   c:'#cbb24b'},
  {id:'gear',     lbl:'Gear (you)',    c:'#9a78dd'}
];
var FAMC={}; FAM.forEach(function(f){FAMC[f.id]=f.c;});
var TIERS=['Surface','Shallow','Upper','Mid','Deep','Lower','Hazard','Abyss'];
var TIERDEPTH=['0-30m','30-80m','80-160m','160-300m','300-460m','460-680m','680-920m','920m+'];

var SVGNS='http://www.w3.org/2000/svg';
var svg=document.getElementById('svg');
var byId={}; ITEMS.forEach(function(it){byId[it.id]=it;});
/* outputs map: who uses each item */
ITEMS.forEach(function(it){it._out=[];});
ITEMS.forEach(function(it){ (it.in||[]).forEach(function(p){ var s=byId[p[0]]; if(s) s._out.push(it.id); }); });

/* ---- layout: x by tier, lanes by family ---- */
var COLW=190, COL0=150, ROWPAD=30, NODEGAP=30, LANEGAP=14, LANETOP=70;
function radius(v){ return Math.max(6, Math.min(26, 5+4.4*Math.log10(v+1))); }

var lanes=[];
var y=LANETOP;
FAM.forEach(function(f){
  var members=ITEMS.filter(function(it){return it.f===f.id;});
  var buckets={}; var maxStack=1;
  members.forEach(function(it){ (buckets[it.t]=buckets[it.t]||[]).push(it); });
  for(var t=0;t<8;t++){ if(buckets[t]){ buckets[t].sort(function(a,b){return a.v-b.v;}); maxStack=Math.max(maxStack,buckets[t].length); } }
  var laneH=maxStack*NODEGAP+ROWPAD;
  for(var t2=0;t2<8;t2++){
    var arr=buckets[t2]||[];
    arr.forEach(function(it,i){
      it._x = COL0 + t2*COLW;
      it._y = y + ROWPAD/2 + i*NODEGAP + NODEGAP/2;
    });
  }
  lanes.push({f:f,top:y,h:laneH,members:members});
  y += laneH + LANEGAP;
});
var TOTALH=y+30, TOTALW=COL0+8*COLW+40;

/* ---- build SVG ---- */
var vp=document.createElementNS(SVGNS,'g'); vp.setAttribute('id','vp'); svg.appendChild(vp);

var bg=document.createElementNS(SVGNS,'g'); vp.appendChild(bg);
lanes.forEach(function(L){
  var r=document.createElementNS(SVGNS,'rect');
  r.setAttribute('class','lane'); r.setAttribute('x',10); r.setAttribute('y',L.top);
  r.setAttribute('width',TOTALW-20); r.setAttribute('height',L.h); r.setAttribute('rx',7);
  bg.appendChild(r);
  var t=document.createElementNS(SVGNS,'text'); t.setAttribute('class','famlbl');
  t.setAttribute('x',18); t.setAttribute('y',L.top+15); t.setAttribute('fill',L.f.c);
  t.textContent=L.f.lbl; bg.appendChild(t);
});
for(var t=0;t<8;t++){
  var hx=COL0+t*COLW;
  var th=document.createElementNS(SVGNS,'text'); th.setAttribute('class','tierhdr');
  th.setAttribute('x',hx); th.setAttribute('y',40); th.setAttribute('text-anchor','middle');
  th.textContent='T'+t+' '+TIERS[t]; bg.appendChild(th);
  var ts=document.createElementNS(SVGNS,'text'); ts.setAttribute('class','tiersub');
  ts.setAttribute('x',hx); ts.setAttribute('y',53); ts.setAttribute('text-anchor','middle');
  ts.textContent=TIERDEPTH[t]; bg.appendChild(ts);
  var gl=document.createElementNS(SVGNS,'line'); gl.setAttribute('x1',hx); gl.setAttribute('x2',hx);
  gl.setAttribute('y1',60); gl.setAttribute('y2',TOTALH-10); gl.setAttribute('stroke','#161c28'); gl.setAttribute('stroke-width',1);
  bg.appendChild(gl);
}

/* edges */
var edgeG=document.createElementNS(SVGNS,'g'); vp.appendChild(edgeG);
var edges=[];
ITEMS.forEach(function(it){
  (it.in||[]).forEach(function(p){
    var s=byId[p[0]]; if(!s) return;
    var path=document.createElementNS(SVGNS,'path');
    var x1=s._x, y1=s._y, x2=it._x, y2=it._y, mx=(x1+x2)/2;
    path.setAttribute('d','M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2);
    path.setAttribute('class','edge');
    path.setAttribute('stroke',FAMC[s.f]);
    path.setAttribute('stroke-width',(0.5+0.45*p[1]).toFixed(2));
    path.setAttribute('stroke-opacity','0.13');
    edgeG.appendChild(path);
    edges.push({el:path,a:s.id,b:it.id,w:(0.5+0.45*p[1])});
  });
});

/* nodes */
var nodeG=document.createElementNS(SVGNS,'g'); vp.appendChild(nodeG);
var nodeEls={};
ITEMS.forEach(function(it){
  var g=document.createElementNS(SVGNS,'g'); g.setAttribute('class','node');
  g.setAttribute('transform','translate('+it._x+','+it._y+')');
  var c=document.createElementNS(SVGNS,'circle');
  c.setAttribute('r',radius(it.v)); c.setAttribute('fill',FAMC[it.f]);
  g.appendChild(c);
  var lb=document.createElementNS(SVGNS,'text'); lb.setAttribute('class','nlabel');
  lb.setAttribute('text-anchor','middle'); lb.setAttribute('y',radius(it.v)+9);
  lb.textContent=it.n; g.appendChild(lb);
  nodeG.appendChild(g);
  nodeEls[it.id]={g:g,c:c,lb:lb};
  g.addEventListener('mouseenter',function(){hover(it.id);});
  g.addEventListener('mousemove',function(e){moveTip(e,it);});
  g.addEventListener('mouseleave',function(){if(!selected)clearHi();hideTip();});
  g.addEventListener('click',function(e){e.stopPropagation();select(it.id);});
});

/* ---- highlight logic ---- */
var hidden={};
function neighborsOf(id){ var s={}; s[id]=1; var it=byId[id];
  (it.in||[]).forEach(function(p){s[p[0]]=1;}); it._out.forEach(function(o){s[o]=1;}); return s; }
function applyHi(set){
  ITEMS.forEach(function(it){ var el=nodeEls[it.id];
    el.g.style.opacity = set===null ? (hidden[it.f]?0.05:1) : ((set[it.id]&&!hidden[it.f])?1:0.12);
  });
  edges.forEach(function(e){
    var lit = set && set[e.a] && set[e.b] && !hidden[byId[e.a].f] && !hidden[byId[e.b].f];
    e.el.setAttribute('stroke-opacity', set===null ? (hidden[byId[e.a].f]||hidden[byId[e.b].f]?0.02:0.13) : (lit?0.85:0.04));
    e.el.setAttribute('stroke-width', lit? (e.w+0.7).toFixed(2) : e.w.toFixed(2));
  });
}
function hover(id){ if(selected)return; applyHi(neighborsOf(id)); }
function clearHi(){ applyHi(null); }

/* ---- detail panel ---- */
var selected=null;
var panel=document.getElementById('panel'), pbody=document.getElementById('pbody');
function famName(f){ for(var i=0;i<FAM.length;i++) if(FAM[i].id===f) return FAM[i].lbl; return f; }
function select(id){ selected=id; var it=byId[id]; applyHi(neighborsOf(id));
  var h='<h2 style="color:'+FAMC[it.f]+'">'+it.n+'</h2>';
  h+='<div class="meta">'+famName(it.f)+' &middot; Tier '+it.t+' ('+TIERS[it.t]+') &middot; <span class="val">value '+it.v.toLocaleString()+'</span></div>';
  if(it.u) h+='<div class="note">'+it.u+'</div>';
  if(it.in&&it.in.length){ h+='<h3>Made from</h3><ul>';
    it.in.forEach(function(p){ var s=byId[p[0]]; if(s) h+='<li><span style="color:'+FAMC[s.f]+'">'+s.n+'</span><span class="q">x'+p[1]+'</span></li>'; });
    h+='</ul>'; } else { h+='<h3>Source</h3><div class="note">Raw. Found by mining or extraction at tier '+it.t+'.</div>'; }
  if(it._out&&it._out.length){ h+='<h3>Used in</h3><ul>';
    it._out.forEach(function(o){ var d=byId[o]; h+='<li><span style="color:'+FAMC[d.f]+'">'+d.n+'</span><span class="q">'+famName(d.f)+'</span></li>'; });
    h+='</ul>'; } else { h+='<h3>Used in</h3><div class="note">End product. Sold to towns, or final gear.</div>'; }
  pbody.innerHTML=h; panel.style.display='block';
}
document.getElementById('px').addEventListener('click',function(){deselect();});
document.getElementById('stage').addEventListener('click',function(){deselect();});
function deselect(){ selected=null; panel.style.display='none'; clearHi(); }

/* ---- tooltip ---- */
var tip=document.getElementById('tip');
function moveTip(e,it){ tip.style.display='block'; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px';
  tip.innerHTML='<b>'+it.n+'</b><br>'+famName(it.f)+' &middot; T'+it.t+' &middot; value '+it.v.toLocaleString(); }
function hideTip(){ tip.style.display='none'; }

/* ---- family filter chips ---- */
var chips=document.getElementById('chips');
FAM.forEach(function(f){
  var c=document.createElement('div'); c.className='chip on';
  c.innerHTML='<span class="sw" style="background:'+f.c+'"></span>'+f.lbl;
  c.addEventListener('click',function(){ hidden[f.id]=!hidden[f.id]; c.classList.toggle('on',!hidden[f.id]);
    if(selected)applyHi(neighborsOf(selected)); else applyHi(null); });
  chips.appendChild(c);
});

/* ---- search ---- */
document.getElementById('search').addEventListener('input',function(e){
  var q=e.target.value.trim().toLowerCase();
  if(!q){ if(selected)applyHi(neighborsOf(selected)); else applyHi(null); return; }
  var set={}; ITEMS.forEach(function(it){ if(it.n.toLowerCase().indexOf(q)>=0) set[it.id]=1; });
  ITEMS.forEach(function(it){ nodeEls[it.id].g.style.opacity=(set[it.id]&&!hidden[it.f])?1:0.08; });
  edges.forEach(function(ed){ ed.el.setAttribute('stroke-opacity',0.02); });
});

/* ---- zoom + pan ---- */
var sc=1, tx=0, ty=0, interacted=false;
function vw(){ return Math.max(320, window.innerWidth||1200); }
function vh(){ return Math.max(320, (window.innerHeight||800)-54); }
function apply(){ vp.setAttribute('transform','translate('+tx+','+ty+') scale('+sc+')'); }
function fit(){ var pad=40, W=vw(), H=vh(); var s=Math.min((W-pad*2)/TOTALW,(H-pad*2)/TOTALH); s=Math.max(0.08,Math.min(s,2)); sc=s; tx=(W-TOTALW*s)/2; ty=(H-TOTALH*s)/2+10; apply(); }
var stage=document.getElementById('stage');
stage.addEventListener('wheel',function(e){ e.preventDefault(); interacted=true; var f=e.deltaY<0?1.12:1/1.12;
  var mx=e.clientX, my=e.clientY-54; tx=mx-(mx-tx)*f; ty=my-(my-ty)*f; sc*=f; apply(); },{passive:false});
var dragging=false,lx,ly;
stage.addEventListener('mousedown',function(e){dragging=true;interacted=true;lx=e.clientX;ly=e.clientY;stage.classList.add('drag');});
window.addEventListener('mousemove',function(e){ if(!dragging)return; tx+=e.clientX-lx; ty+=e.clientY-ly; lx=e.clientX; ly=e.clientY; apply(); });
window.addEventListener('mouseup',function(){dragging=false;stage.classList.remove('drag');});
document.getElementById('fit').addEventListener('click',fit);
document.getElementById('zin').addEventListener('click',function(){ interacted=true; sc*=1.2; apply(); });
document.getElementById('zout').addEventListener('click',function(){ interacted=true; sc/=1.2; apply(); });
window.addEventListener('resize',function(){ if(!interacted) fit(); });

document.querySelector('#top h1 small').textContent =
  ITEMS.length+' items across 8 tiers and 8 families. draft economy, values relative.';

requestAnimationFrame(fit);
window.addEventListener('load',function(){ if(!interacted) fit(); });
</script>
</body>
</html>
